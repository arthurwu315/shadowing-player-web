<!doctype html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouTube 跟讀播放器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0b1020",
            card: "#111827",
            line: "#1f2937",
            accent: "#22d3ee"
          }
        }
      }
    };
  </script>
  <style>
    .safe-bottom {
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }
  </style>
</head>
<body class="bg-bg text-slate-100 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-5 sm:py-8 safe-bottom">
    <header class="mb-5 sm:mb-6">
      <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">YouTube 跟讀播放器</h1>
      <p class="text-slate-300 mt-2 text-sm sm:text-base">貼上影片網址，讀取字幕後可點擊句子跳轉播放，也可單句循環。</p>
    </header>

    <section class="bg-card/90 border border-slate-700 rounded-2xl p-3 sm:p-4 shadow-xl">
      <label for="urlInput" class="block text-sm text-slate-300 mb-2">YouTube 網址</label>
      <div class="flex flex-col sm:flex-row gap-3">
        <input
          id="urlInput"
          type="text"
          placeholder="https://www.youtube.com/watch?v=..."
          class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-4 text-base focus:outline-none focus:ring-2 focus:ring-cyan-400"
        />
        <button
          id="loadBtn"
          class="min-h-14 sm:min-h-12 rounded-xl bg-cyan-400 text-slate-900 font-semibold px-5 py-3 text-base hover:bg-cyan-300 active:scale-[0.99] transition"
        >
          載入影片與字幕
        </button>
      </div>
      <p id="status" class="mt-3 text-sm text-slate-300">尚未載入影片</p>
    </section>

    <section class="mt-4 sm:mt-6 bg-card/90 border border-slate-700 rounded-2xl p-3 sm:p-4 shadow-xl">
      <div class="aspect-video w-full rounded-xl overflow-hidden bg-black">
        <div id="player" class="w-full h-full"></div>
      </div>
      <div class="mt-3 flex flex-wrap items-center gap-2 text-sm">
        <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">影片：<span id="videoIdText">-</span></span>
        <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">字幕行數：<span id="countText">0</span></span>
        <button id="stopLoopBtn" class="min-h-12 rounded-xl border border-rose-400 text-rose-300 px-4 py-2 hover:bg-rose-500/10">停止循環</button>
      </div>
    </section>

    <section class="mt-4 sm:mt-6">
      <h2 class="text-lg sm:text-xl font-semibold mb-3">所有字幕行</h2>
      <div id="transcriptList" class="space-y-2"></div>
    </section>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const ui = {
      urlInput: document.getElementById("urlInput"),
      loadBtn: document.getElementById("loadBtn"),
      status: document.getElementById("status"),
      transcriptList: document.getElementById("transcriptList"),
      videoIdText: document.getElementById("videoIdText"),
      countText: document.getElementById("countText"),
      stopLoopBtn: document.getElementById("stopLoopBtn")
    };

    let player = null;
    let playerReady = false;
    let transcript = [];
    let activeLoop = null;
    let loopTimer = null;
    let highlightTimer = null;

    function setStatus(message, isError = false) {
      ui.status.textContent = message;
      ui.status.className = "mt-3 text-sm " + (isError ? "text-rose-300" : "text-slate-300");
    }

    function parseYouTubeId(input) {
      try {
        const url = new URL(input);
        if (url.hostname.includes("youtu.be")) return url.pathname.replace("/", "");
        if (url.pathname.startsWith("/shorts/")) return url.pathname.split("/")[2] || "";
        if (url.pathname.startsWith("/embed/")) return url.pathname.split("/")[2] || "";
        return url.searchParams.get("v") || "";
      } catch {
        return "";
      }
    }

    function formatTime(sec) {
      const s = Math.max(0, Math.floor(sec));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${String(r).padStart(2, "0")}`;
    }

    function normalizeTranscript(data) {
      const root =
        Array.isArray(data) ? data :
        Array.isArray(data?.transcript) ? data.transcript :
        Array.isArray(data?.captions) ? data.captions :
        Array.isArray(data?.content) ? data.content :
        [];

      const lines = root
        .map((item, idx) => {
          const text = String(item.text ?? item.transcript ?? item.caption ?? "").trim();
          const start = Number(item.start ?? item.offset ?? item.from ?? item.startTime ?? item.start_time);
          const duration = Number(item.duration ?? item.dur ?? item.length ?? 0);
          return {
            id: idx,
            text,
            start: Number.isFinite(start) ? start : NaN,
            duration: Number.isFinite(duration) ? duration : 0
          };
        })
        .filter((line) => line.text && Number.isFinite(line.start))
        .sort((a, b) => a.start - b.start);

      for (let i = 0; i < lines.length; i += 1) {
        if (!lines[i].duration || lines[i].duration <= 0) {
          const next = lines[i + 1];
          lines[i].duration = next ? Math.max(0.8, next.start - lines[i].start) : 2.5;
        }
      }
      return lines;
    }

    async function fetchJson(url, timeoutMs = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { signal: controller.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function fetchTranscript(videoUrl, videoId) {
      const providers = [
        {
          name: "Supadata",
          url: `https://api.supadata.ai/v1/transcript?url=${encodeURIComponent(videoUrl)}`
        },
        {
          name: "youtubetranscript.com",
          url: `https://youtubetranscript.com/?server_vid2=${encodeURIComponent(videoId)}`
        }
      ];

      const errors = [];
      for (const p of providers) {
        try {
          setStatus(`正在向 ${p.name} 取得字幕...`);
          const data = await fetchJson(p.url);
          const parsed = normalizeTranscript(data);
          if (parsed.length > 0) return { parsed, provider: p.name };
          errors.push(`${p.name}: 回傳格式不含有效字幕`);
        } catch (err) {
          errors.push(`${p.name}: ${err.message}`);
        }
      }
      throw new Error(errors.join(" | "));
    }

    function ensurePlayer(videoId) {
      if (!player) {
        player = new YT.Player("player", {
          videoId,
          playerVars: { rel: 0, playsinline: 1, modestbranding: 1 }
        });
      } else {
        player.loadVideoById(videoId);
      }
    }

    function clearLoop() {
      activeLoop = null;
      if (loopTimer) clearInterval(loopTimer);
      loopTimer = null;
      document.querySelectorAll("[data-loop-btn]").forEach((btn) => {
        btn.classList.remove("bg-emerald-400", "text-slate-900", "border-emerald-300");
      });
    }

    function jumpToLine(index) {
      const line = transcript[index];
      if (!line || !playerReady || !player) return;
      player.seekTo(line.start, true);
      player.playVideo();
      highlightLine(index);
    }

    function loopLine(index) {
      const line = transcript[index];
      if (!line || !playerReady || !player) return;

      const start = line.start;
      const end = line.start + line.duration;

      activeLoop = { index, start, end };
      jumpToLine(index);
      clearInterval(loopTimer);
      loopTimer = setInterval(() => {
        if (!player || !activeLoop) return;
        const t = player.getCurrentTime();
        if (t >= activeLoop.end - 0.05) {
          player.seekTo(activeLoop.start, true);
          player.playVideo();
        }
      }, 140);
    }

    function highlightLine(index) {
      document.querySelectorAll("[data-line]").forEach((row) => row.classList.remove("ring-2", "ring-cyan-400"));
      const target = document.querySelector(`[data-line="${index}"]`);
      if (target) target.classList.add("ring-2", "ring-cyan-400");
    }

    function renderTranscript() {
      ui.transcriptList.innerHTML = "";
      ui.countText.textContent = String(transcript.length);

      if (!transcript.length) {
        ui.transcriptList.innerHTML = `
          <div class="rounded-xl border border-slate-700 bg-card p-4 text-slate-300">
            沒有可顯示的字幕。請確認影片有公開字幕，或換一個 API 來源再試。
          </div>
        `;
        return;
      }

      transcript.forEach((line, index) => {
        const row = document.createElement("div");
        row.setAttribute("data-line", String(index));
        row.className = "rounded-xl border border-slate-700 bg-line/70 p-3 sm:p-4";
        row.innerHTML = `
          <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
            <button data-jump-btn="${index}" class="w-full sm:w-auto min-h-12 rounded-xl bg-cyan-400 text-slate-900 px-4 py-2 font-semibold text-base">
              ${formatTime(line.start)} 跳到這句
            </button>
            <button data-loop-btn="${index}" class="w-full sm:w-auto min-h-12 rounded-xl border border-slate-500 px-4 py-2 text-base">
              🔁 循環
            </button>
            <p class="text-base leading-relaxed text-slate-100">${line.text}</p>
          </div>
        `;
        ui.transcriptList.appendChild(row);
      });

      document.querySelectorAll("[data-jump-btn]").forEach((btn) => {
        btn.addEventListener("click", () => {
          jumpToLine(Number(btn.getAttribute("data-jump-btn")));
          clearLoop();
        });
      });

      document.querySelectorAll("[data-loop-btn]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.getAttribute("data-loop-btn"));
          if (activeLoop && activeLoop.index === idx) {
            clearLoop();
            return;
          }
          clearLoop();
          btn.classList.add("bg-emerald-400", "text-slate-900", "border-emerald-300");
          loopLine(idx);
        });
      });
    }

    async function loadVideoAndTranscript() {
      const url = ui.urlInput.value.trim();
      if (!url) {
        setStatus("請先貼上 YouTube 網址", true);
        return;
      }
      const videoId = parseYouTubeId(url);
      if (!videoId) {
        setStatus("網址格式無法辨識 YouTube 影片 ID", true);
        return;
      }

      ui.videoIdText.textContent = videoId;
      setStatus("正在載入影片...");
      ensurePlayer(videoId);
      clearLoop();

      try {
        const result = await fetchTranscript(url, videoId);
        transcript = result.parsed;
        renderTranscript();
        setStatus(`字幕載入成功（來源：${result.provider}）`);
      } catch (err) {
        transcript = [];
        renderTranscript();
        setStatus(`字幕載入失敗：${err.message}`, true);
      }
    }

    function trackCurrentLine() {
      if (!playerReady || !player || !transcript.length) return;
      const t = player.getCurrentTime();
      for (let i = transcript.length - 1; i >= 0; i -= 1) {
        if (t >= transcript[i].start) {
          highlightLine(i);
          break;
        }
      }
    }

    window.onYouTubeIframeAPIReady = () => {
      playerReady = true;
      if (ui.urlInput.value.trim()) loadVideoAndTranscript();
      clearInterval(highlightTimer);
      highlightTimer = setInterval(trackCurrentLine, 300);
    };

    ui.loadBtn.addEventListener("click", loadVideoAndTranscript);
    ui.stopLoopBtn.addEventListener("click", clearLoop);
    ui.urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadVideoAndTranscript();
    });
  </script>
</body>
</html>
