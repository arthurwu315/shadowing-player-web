<!doctype html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouTube 跟讀播放器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { bg: "#0b1020", card: "#111827", line: "#1f2937" } } } };
  </script>
  <style>
    :root {
      --radius-control: 8px;
      --radius-card: 12px;
      --radius-chip: 9999px;
      --color-ink-warm: #433D3C;
    }
    body {
      background: #FFFDF0 !important;
      color: #433D3C !important;
      font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans", "Noto Sans TC", "Noto Sans JP", "Noto Sans KR", sans-serif;
    }
    #app-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #left-panel { flex: 0 0 auto; max-height: 60vh; overflow-y: auto; overflow-x: hidden; position: relative; z-index: 2; }
    #subtitle-container { flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; min-height: 0; min-width: 0; width: 100%; position: relative; z-index: 1; }
    .pixel-title, .count-badge { font-family: "VT323", monospace; letter-spacing: 0.03em; }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    .history-anchor { position: relative; }
    .history-pop {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      width: min(340px, 82vw);
      max-height: 280px;
      overflow-y: auto;
      background: #ffffff;
      border: 2px solid #000;
      box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 1);
      padding: 0.45rem;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 10;
    }
    .history-anchor.desktop-open .history-pop,
    .history-anchor.pinned-open .history-pop {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      width: 100%;
      margin-bottom: 0.35rem;
      border: 2px solid #000;
      background: #fffdf9;
      padding: 0.25rem 0.35rem;
      box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 1);
    }
    .history-item:last-child { margin-bottom: 0; }
    .history-label {
      display: inline-block;
      max-width: 210px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      color: #2b2d42;
    }
    section, dialog, .subtitle-row, input, textarea, label {
      border-radius: var(--radius-card) !important;
      border: 2px solid #433D3C !important;
      box-shadow: 4px 4px 0 0 rgba(67, 61, 60, 0.2) !important;
    }
    section, dialog, .subtitle-row, label { background: #fffdf6 !important; }
    input, textarea { background: #fffdf9 !important; color: #2B2D42 !important; }
    button, .pill-btn, .subtitle-text, label, p, .text-sm, .text-base {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif !important;
      font-size: max(16px, 1rem) !important;
      line-height: 1.6 !important;
    }
    button, .pill-btn {
      transition: transform 120ms ease, filter 120ms ease, background-color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      background: #B7C4CF !important;
      color: #433D3C !important;
      border: 2px solid #433D3C !important;
      border-radius: var(--radius-control) !important;
      box-shadow: 4px 4px 0 0 rgba(67, 61, 60, 0.2) !important;
      font-weight: 700;
      padding-left: 0.9rem !important;
      padding-right: 0.9rem !important;
    }
    button:hover, .pill-btn:hover { filter: brightness(0.92); opacity: 0.8; transform: translateY(-1px); }
    button:active, .pill-btn:active {
      transform: translate(1px, 1px) scale(0.95);
      box-shadow: 2px 2px 0 0 rgba(67, 61, 60, 0.2) !important;
    }
    #loadBtn, #prevBtn, #replayBtn, #nextBtn, [data-rate-btn], [data-action="play"], [data-action="jump"] { background: #B7C4CF !important; }
    #globalShowEnBtn, #globalShowZhBtn, #globalShowBothBtn { background: #EEE3CB !important; }
    #stopLoopBtn, [data-action="loop"], #manualCancelBtn { background: #D7C0AE !important; }
    .subtitle-text { color: #433D3C !important; background: #fffaf3 !important; border-color: #433D3C !important; }
    .subtitle-row .text-sky-200 { color: #433D3C !important; }
    .count-badge { background: #f5efe5 !important; color: #2B2D42 !important; }
    .subtitle-row { scroll-margin-block: 35vh; }
    .control-tower {
      position: relative;
      transition: all 0.3s ease-in-out;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(253, 251, 247, 0.82) !important;
      border-bottom: 2px solid #000 !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }
    .control-panel { max-height: 999px; overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.2s ease; }
    .control-tower.compact .control-panel { max-height: 0; opacity: 0; margin: 0; border: 0 !important; box-shadow: none !important; }
    .player-shell.player-hidden { display: none; }
    .tower-global-row {
      max-height: none;
      overflow: visible;
      white-space: normal;
      align-items: center;
      flex-wrap: wrap;
    }
    .pixel-group {
      border: 2px solid #433D3C;
      background: #ffffff;
      box-shadow: 4px 4px 0 0 rgba(67, 61, 60, 0.2);
      padding: 0.5rem;
    }
    .pixel-group-accent {
      border: 2px solid #433D3C;
      background: #f0f5f4;
      box-shadow: 4px 4px 0 0 rgba(67, 61, 60, 0.2);
      padding: 0.5rem;
    }
    .recent-chip {
      border: 2px solid #433D3C;
      background: #ffffff;
      padding: 0.2rem 0.35rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      box-shadow: 4px 4px 0 0 rgba(67, 61, 60, 0.2);
      border-radius: var(--radius-card) !important;
    }
    .history-card-title {
      max-width: 128px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #2b2d42;
      font-weight: 700;
    }
    @media (max-width: 640px) { .control-panel { max-height: none; overflow: visible; } }
    .pill-btn {
      min-height: 44px;
      border-radius: var(--radius-control) !important;
      border: 2px solid #000;
      background: #A3B18A;
      padding: 0.55rem 0.95rem;
      font-size: 0.9rem;
      line-height: 1.1rem;
      white-space: nowrap;
    }
    .global-blur .subtitle-text { filter: blur(5px); opacity: 0.82; }
    .global-blur .subtitle-row.is-current .subtitle-text,
    .global-blur .subtitle-row.intent-reveal .subtitle-text { filter: none; opacity: 1; }
    .subtitle-row:hover { background: rgba(163, 177, 138, 0.09) !important; }
    .card-section {
      border: 1px solid rgba(67, 61, 60, 0.18);
      border-radius: var(--radius-card);
      padding: 0.65rem;
      background: rgba(255, 255, 255, 0.7);
    }
    .section-title {
      color: #433D3C;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .btn-primary {
      background: #B7C4CF !important;
      color: #433D3C !important;
      border-color: #433D3C !important;
    }
    .btn-secondary {
      background: #EEE3CB !important;
      color: #433D3C !important;
      border-color: #433D3C !important;
    }
    .subtitle-card.active {
      border: 3px solid #A3B18A !important;
    }
    .subtitle-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .subtitle-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.45rem;
    }
    .count-badge,
    .rounded-full {
      border-radius: var(--radius-chip) !important;
    }
    .subtitle-row.is-current {
      border: 3px solid #A3B18A !important;
      background: rgba(255, 221, 210, 0.5) !important;
      box-shadow: 0 0 0 1px rgba(163, 177, 138, 0.28), 0 14px 34px rgba(226, 149, 120, 0.25);
      transform: scale(1.02);
      position: relative;
      animation: border-breathe 2.4s ease-in-out infinite, active-bg-pulse 2.6s ease-in-out infinite;
    }
    .subtitle-row.is-current::before {
      content: "";
      position: absolute;
      left: -3px;
      top: 0;
      bottom: 0;
      width: 5px;
      background: #E29578;
    }
    @keyframes border-breathe {
      0%, 100% { box-shadow: 0 0 0 1px rgba(163, 177, 138, 0.25), 0 10px 22px rgba(226, 149, 120, 0.22); }
      50% { box-shadow: 0 0 0 2px rgba(163, 177, 138, 0.45), 0 14px 30px rgba(226, 149, 120, 0.34); }
    }
    @keyframes active-bg-pulse {
      0%, 100% { background: rgba(255, 221, 210, 0.5); }
      50% { background: rgba(255, 221, 210, 0.72); }
    }
    #subtitle-container::-webkit-scrollbar, #left-panel::-webkit-scrollbar { width: 10px; }
    #subtitle-container::-webkit-scrollbar-track, #left-panel::-webkit-scrollbar-track { background: #d9d9d9; border-left: 2px solid #000; }
    #subtitle-container::-webkit-scrollbar-thumb, #left-panel::-webkit-scrollbar-thumb { background: #2f2f2f; border: 2px solid #000; }
    #subtitle-container, #left-panel { scrollbar-color: #2f2f2f #d9d9d9; scrollbar-width: thin; }
    .text-slate-300, .text-slate-500, #status { color: #4a4a4a !important; }
    @media (min-width: 1280px) {
      #left-panel { max-height: 100vh; height: 100vh; }
      .top-pane-inner { max-width: none; margin: 0 auto; width: 100%; }
      #transcriptList { max-width: 56rem; margin: 0 auto; }
      #app-container {
        display: grid !important;
        grid-template-columns: clamp(360px, 35vw, 420px) 1fr;
        grid-template-rows: 100vh;
      }
      #left-panel {
        border-right: 2px solid #000;
      }
      #subtitle-container {
        height: 100vh;
      }
      #toggleSidebarBtn { display: inline-flex !important; }
      #showSidebarBtn { display: none; }
      #app-container.sidebar-hidden { grid-template-columns: 1fr; }
      #app-container.sidebar-hidden #left-panel { display: none; }
      #app-container.sidebar-hidden #subtitle-container { width: 100% !important; min-width: 0; }
      #app-container.sidebar-hidden #showSidebarBtn { display: inline-flex; }
    }
    @media (orientation: landscape) and (max-height: 560px) and (min-width: 769px) {
      #controlTower { padding: 0.4rem !important; }
      #controlTower .aspect-video { max-height: 34vh; }
      #controlTower .control-panel { max-height: 72px; }
      #controlTower .min-h-12, #controlTower .min-h-14 { min-height: 2.1rem !important; padding-top: 0.25rem !important; padding-bottom: 0.25rem !important; }
      #controlTower .pill-btn { min-height: 34px; font-size: 0.8rem; padding: 0.35rem 0.6rem; }
      #controlTower .grid { gap: 0.35rem !important; }
    }
    @media (max-width: 1024px) and (orientation: portrait) {
      #left-panel { max-height: 50dvh; min-height: 50dvh; }
      #subtitle-container { min-height: 50dvh; }
    }
    @media (min-width: 897px) and (max-width: 1024px) and (orientation: landscape) {
      #app-container {
        display: grid !important;
        grid-template-columns: 42% 58%;
        grid-template-rows: 100dvh;
      }
      #left-panel, #subtitle-container { height: 100dvh; max-height: 100dvh; }
      .mobile-hide-landscape { display: none !important; }
      #subtitle-container { padding-top: 0.5rem !important; }
    }
    @media (max-width: 768px) {
      .mobile-topbar,
      .mobile-bottombar { display: flex; }
      #app-container {
        height: 100dvh;
        overflow-y: auto;
      }
      #left-panel {
        max-height: none;
        overflow: visible;
      }
      #subtitle-container { overflow: visible; padding-bottom: 100px !important; }
      #controlTower .control-panel {
        max-height: none !important;
        overflow: visible !important;
      }
      .playback-main-nav { display: none !important; }
      #stopLoopBtn { display: none !important; }
    }
    @media (min-width: 769px) and (max-width: 896px) and (orientation: landscape) {
      .mobile-landscape-panel { display: flex; }
      .mobile-topbar,
      .mobile-bottombar { display: none !important; }
      #app-container {
        height: 100dvh;
        overflow-y: auto;
      }
      #left-panel {
        max-height: none;
      }
    }
    .bottom-sheet-wrap {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(0, 0, 0, 0.38);
    }
    .bottom-sheet-wrap.open { display: block; }
    .bottom-sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 56dvh;
      overflow: auto;
      background: #fffdf9;
      border-top: 2px solid #433D3C;
      box-shadow: 0 -6px 0 0 rgba(67, 61, 60, 0.2);
      padding: 0.7rem;
    }
    #showSidebarBtn.show-sidebar-fab {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 60;
      display: inline-flex !important;
      white-space: nowrap;
    }
    #subtitle-container h2 {
      min-width: 0;
      white-space: normal;
      writing-mode: horizontal-tb;
    }
    body.theme-hardcore section, body.theme-hardcore dialog, body.theme-hardcore .subtitle-row, body.theme-hardcore input, body.theme-hardcore textarea, body.theme-hardcore label {
      border-radius: 0 !important;
      border-color: #000 !important;
      box-shadow: 4px 4px 0 0 rgba(0, 0, 0, 1) !important;
      background: #fff !important;
    }
    body.theme-hardcore button, body.theme-hardcore .pill-btn {
      border-radius: 2px !important;
      border-color: #000 !important;
      box-shadow: 4px 4px 0 0 rgba(0, 0, 0, 1) !important;
    }
    body.theme-business {
      background: #f3f7ff !important;
      color: #1f2a44 !important;
    }
    body.theme-business section, body.theme-business dialog, body.theme-business .subtitle-row, body.theme-business input, body.theme-business textarea, body.theme-business label {
      border: 0 !important;
      border-radius: 12px !important;
      box-shadow: 0 1px 3px rgba(39, 110, 241, 0.12) !important;
      background: #ffffff !important;
    }
    body.theme-business button, body.theme-business .pill-btn {
      border: 0 !important;
      border-radius: 8px !important;
      box-shadow: 0 1px 3px rgba(39, 110, 241, 0.16) !important;
      background: #5b8def !important;
      color: #fff !important;
    }
    body.theme-business .bg-slate-800,
    body.theme-business .bg-slate-900,
    body.theme-business .bg-card\/70 {
      background: #eef4ff !important;
      color: #1f2a44 !important;
      border-color: #d4e4ff !important;
    }
    body.theme-business .subtitle-row.is-current {
      border: 3px solid #3b82f6 !important;
      box-shadow: 0 8px 26px rgba(59, 130, 246, 0.35) !important;
    }
    .mobile-topbar,
    .mobile-bottombar,
    .mobile-landscape-panel {
      display: none;
    }
    .mobile-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 80;
      height: 56px;
      padding: 0 0.75rem;
      background: rgba(255, 253, 246, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 2px solid #433D3C;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .mobile-brand {
      font-family: "VT323", monospace;
      font-size: 1.35rem;
      color: #433D3C;
      white-space: nowrap;
    }
    .mobile-rate-group { display: inline-flex; gap: 0.35rem; }
    .mobile-rate-btn {
      min-height: 32px !important;
      padding: 0.2rem 0.55rem !important;
      border-radius: 8px !important;
      font-size: 0.82rem !important;
      line-height: 1.1 !important;
      background: #EEE3CB !important;
      border: 2px solid #433D3C !important;
      color: #433D3C !important;
      box-shadow: 2px 2px 0 0 rgba(67, 61, 60, 0.2) !important;
    }
    .mobile-rate-btn.active {
      background: #B7C4CF !important;
      color: #1f2937 !important;
      border-color: #1f2937 !important;
    }
    .mobile-bottombar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      height: 64px;
      padding: 0.45rem 0.55rem calc(0.45rem + env(safe-area-inset-bottom));
      background: #fffdf0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 2px solid #433D3C;
      box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
      align-items: center;
      justify-content: space-around;
      gap: 0.4rem;
    }
    #mobile-bottom-bar {
      background: #fffdf0;
      border-top: 2px solid #433D3C;
      box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05);
      min-height: 70px;
    }
    #mobile-bottom-bar button {
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      opacity: 1 !important;
      visibility: visible !important;
      color: #111827 !important;
    }
    #mobile-bottom-bar #mob-play {
      background: #B7C4CF !important;
      border-color: #433D3C !important;
      color: #433D3C !important;
    }
    body.theme-business #mobile-bottom-bar {
      background: #f8fbff;
      border-top: 1px solid #d4e4ff;
      box-shadow: 0 -5px 15px rgba(39, 110, 241, 0.12);
    }
    body.theme-business #mobile-bottom-bar #mob-play {
      background: #5b8def !important;
      border-color: #3d67b3 !important;
      color: #ffffff !important;
    }
    body.theme-hardcore #mobile-bottom-bar {
      background: #fff;
      border-top: 2px solid #000;
      box-shadow: 0 -5px 0 rgba(0, 0, 0, 1);
    }
    body.theme-hardcore #mobile-bottom-bar #mob-play {
      background: #ffffff !important;
      border-color: #000 !important;
      color: #000 !important;
    }
    .mobile-control-btn {
      flex: 1 1 0;
      min-height: 44px !important;
      padding: 0.35rem 0.2rem !important;
      font-size: 0.95rem !important;
      line-height: 1.1 !important;
      white-space: nowrap;
      text-align: center;
    }
    .mobile-control-btn.active {
      background: #A3B18A !important;
      color: #1f2937 !important;
      border-color: #1f2937 !important;
      box-shadow: 2px 2px 0 0 rgba(67, 61, 60, 0.2) !important;
    }
    .mobile-landscape-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100dvh;
      width: 116px;
      z-index: 85;
      padding: 0.5rem 0.4rem;
      background: rgba(255, 253, 246, 0.95);
      border-left: 2px solid #433D3C;
      box-shadow: -2px 0 0 rgba(67, 61, 60, 0.2);
      overflow: hidden;
      flex-direction: column;
      gap: 0.35rem;
    }
    .mobile-landscape-title {
      font-family: "VT323", monospace;
      font-size: 1.15rem;
      text-align: center;
      margin-bottom: 0.1rem;
      color: #433D3C;
      line-height: 1.1;
    }
    .mobile-landscape-panel .mobile-control-btn {
      flex: 0 0 auto;
      min-height: 40px !important;
      font-size: 0.84rem !important;
      padding: 0.25rem !important;
    }
    .mobile-landscape-panel .mobile-rate-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    @media (max-width: 1024px) {
      .subtitle-actions { display: none !important; }
    }
  </style>
</head>
<body class="bg-bg text-slate-100 min-h-screen theme-warm">
  <div id="mobilePortraitTopBar" class="mobile-topbar" aria-label="手機直式頂部控制列">
    <div class="mobile-brand">Shadowing</div>
    <div class="mobile-rate-group" aria-label="全局語速">
      <button data-rate-btn="0.75" data-rate-compact="1" class="mobile-rate-btn">0.75x</button>
      <button data-rate-btn="1" data-rate-compact="1" class="mobile-rate-btn active">1x</button>
      <button data-rate-btn="1.25" data-rate-compact="1" class="mobile-rate-btn">1.25x</button>
    </div>
  </div>
  <div id="app-container" class="h-screen flex flex-col">
    <div id="left-panel" class="flex-none px-4 pt-4 sm:pt-6">
      <div class="top-pane-inner">
    <header class="mb-5 sm:mb-6 mobile-hide-landscape">
      <div class="header-row">
        <h1 class="pixel-title text-2xl sm:text-3xl font-bold tracking-tight">YouTube 跟讀播放器</h1>
        <div class="flex items-center gap-2">
          <button id="themeToggleBtn" class="pill-btn min-h-10 px-3 py-1 text-sm">🎨 風格：暖系文青</button>
          <div id="historyAnchor" class="history-anchor">
            <button id="historyToggleBtn" class="pill-btn min-h-10 px-3 py-1 text-sm">🕒 歷史</button>
            <div id="historyPopover" class="history-pop"></div>
          </div>
        </div>
      </div>
      <p class="text-slate-300 mt-2 text-sm sm:text-base">雙語字幕、句子跳轉、單句循環、Auto-Pause、顯示控制、計數器。</p>
    </header>

    <section class="bg-card/90 border border-slate-700 rounded-2xl p-3 sm:p-4 shadow-xl mobile-hide-landscape">
      <label for="urlInput" class="block text-sm text-slate-300 mb-2">YouTube 網址或影片 ID</label>
      <div class="flex flex-col sm:flex-row gap-3">

  <script>
    const ui = {

      mobileLandscapePanel: document.getElementById("mobileLandscapePanel"),
      mobilePrevBtn: document.getElementById("mob-prev"),
      mobileLoopBtn: document.getElementById("mob-loop"),
      mobilePlayPauseBtn: document.getElementById("mob-play"),
      mobileNextBtn: document.getElementById("mob-next"),
      mobileLandPrevBtn: document.getElementById("mobileLandPrevBtn"),
      mobileLandLoopBtn: document.getElementById("mobileLandLoopBtn"),
      mobileLandPlayPauseBtn: document.getElementById("mobileLandPlayPauseBtn"),

    let player = null, playerReady = false;
    const state = {
      subtitles: [],

      loopIndex: null,
      loopModeEnabled: false,

      masterSpeed: 1,
      displayMode: "both" // "L1" | "L2" | "both"
    };
    let loopTimer = null, tickTimer = null, autoPauseTimer = null;
    let autoPauseEnabled = false, autoPauseLockIndex = null, completeLockIndex = null;
    let currentVideoId = "", countsByLine = {};
    let globalBlurEnabled = false;
    let focusModeEnabled = false;
    let towerCollapsed = false;
    let playerHidden = false;
    let sidebarHidden = false;
    let historyPinnedOpen = false;
    let intentRevealIndex = -1;
    let currentTheme = "warm";
    const trackLabelA = "L1";
    const trackLabelB = "L2";
    let recentVideos = [];

    const FAIL_MSG = "自動抓取受限，請點擊下方按鈕手動貼入英/中雙語講稿以開始練習";
    const esc = (t) => String(t || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\"","&quot;").replaceAll("'","&#039;");
    const countKey = (line) => `${Math.round(line.start * 1000)}|${line.en || ""}|${line.zh || ""}`;
    const countStorageKey = () => `shadowing-counts:${currentVideoId || "unknown"}`;
    const biStorageKey = () => `shadowing-bilingual:${currentVideoId || "unknown"}`;
    const uiStorageKey = () => `shadowing-ui:${currentVideoId || "unknown"}`;
    const recentVideosKey = "shadowing-recent-videos";
    const lastSessionKey = "shadowing-last-session";
    const themeStorageKey = "shadowing-theme";
    let lastProgressSaveAt = 0;
    let pendingAutoLoadVideoId = "";
    let pendingResumeSeconds = 0;
    const setStatus = (msg, err = false) => {
      ui.status.textContent = msg;
      ui.status.className = "mt-3 text-sm " + (err ? "text-rose-300" : "text-slate-300");
    };
    function findSubtitleIndexById(id) {
      return state.subtitles.findIndex((s) => s.id === id);
    }
    function findSubtitleById(id) {
      return state.subtitles.find((s) => s.id === id) || null;
    }
    function applyTheme(themeName) {
      const normalized = themeName === "hardcore" || themeName === "business" ? themeName : "warm";
      currentTheme = normalized;
      document.body.classList.remove("theme-warm", "theme-hardcore", "theme-business");
      document.body.classList.add(`theme-${normalized}`);
      const text = normalized === "hardcore" ? "🎨 風格：硬派像素" : normalized === "business" ? "🎨 風格：商業專業" : "🎨 風格：暖系文青";
      ui.themeToggleBtn.textContent = text;
      try { localStorage.setItem(themeStorageKey, normalized); } catch {}
    }
    function cycleTheme() {
      const order = ["warm", "hardcore", "business"];
      const i = order.indexOf(currentTheme);
      applyTheme(order[(i + 1) % order.length]);
    }

    function parseYouTubeId(input) {
      const raw = String(input || "").trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
      try {
        const u = new URL(raw);
        if (u.hostname.includes("youtu.be")) return u.pathname.replace("/", "");
        if (u.pathname.startsWith("/shorts/") || u.pathname.startsWith("/embed/")) return u.pathname.split("/")[2] || "";
        return u.searchParams.get("v") || "";
      } catch { return ""; }
    }
    function fmt(sec) { const s = Math.max(0, Math.floor(sec)); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`; }
    function toSec(raw) {
      const p = String(raw).trim().split(":").map(Number);
      if (!p.length || p.some((n) => !Number.isFinite(n))) return NaN;
      if (p.length === 2) return p[0] * 60 + p[1];
      if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
      return NaN;
    }
    function isTimeOnly(line) { return /^\d{1,2}:\d{2}(?::\d{2})?$/.test(line.trim()); }

    function parseScript(rawText, secPerLine) {
      const lines = String(rawText || "").split(/\r?\n/).map((x) => x.trim()).filter(Boolean);
      if (!lines.length) return { mode: "empty", items: [] };
      const timedInline = /^(\d{1,2}:\d{2}(?::\d{2})?)(?:[.,]\d+)?\s+(.+)$/;
      if (lines.some((line) => timedInline.test(line))) {
        const items = lines.map((line) => {
          const m = line.match(timedInline);
          if (!m) return null;
          const s = toSec(m[1]);
          return Number.isFinite(s) ? { start: s, text: m[2].trim() } : null;
        }).filter(Boolean).sort((a, b) => a.start - b.start);
        return { mode: "timed", items };
      }
      if (lines.some((line) => isTimeOnly(line))) {
        const items = [];
        for (let i = 0; i < lines.length; i += 1) {
          if (!isTimeOnly(lines[i])) continue;
          const s = toSec(lines[i]);
          let j = i + 1;
          while (j < lines.length && isTimeOnly(lines[j])) j += 1;
          if (!Number.isFinite(s) || j >= lines.length) continue;
          items.push({ start: s, text: lines[j] });
          i = j;
        }
        items.sort((a, b) => a.start - b.start);
        return { mode: "timed", items };
      }
      const d = Math.max(0.5, Number(secPerLine || 2.5));
      return { mode: "plain", items: lines.map((text, i) => ({ start: i * d, text })) };
    }

    function alignBilingual(enParsed, zhParsed, secPerLine) {
      const d = Math.max(0.8, Number(secPerLine || 2.5));
      const rows = [];
      if (enParsed.mode === "timed" && zhParsed.mode === "timed") {
        const used = new Set();
        for (const enItem of enParsed.items) {
          let best = -1, diff = Infinity;
          for (let i = 0; i < zhParsed.items.length; i += 1) {
            if (used.has(i)) continue;
            const cur = Math.abs(zhParsed.items[i].start - enItem.start);
            if (cur < diff) { diff = cur; best = i; }
          }
          if (best >= 0) used.add(best);
          rows.push({ start: enItem.start, en: enItem.text, zh: best >= 0 ? zhParsed.items[best].text : "" });
        }
        for (let i = 0; i < zhParsed.items.length; i += 1) if (!used.has(i)) rows.push({ start: zhParsed.items[i].start, en: "", zh: zhParsed.items[i].text });
        rows.sort((a, b) => a.start - b.start);
      } else if (enParsed.mode === "timed" || zhParsed.mode === "timed") {
        const timed = enParsed.mode === "timed" ? enParsed.items : zhParsed.items;
        const plain = enParsed.mode === "timed" ? zhParsed.items : enParsed.items;
        for (let i = 0; i < timed.length; i += 1) rows.push({
          start: timed[i].start,
          en: enParsed.mode === "timed" ? timed[i].text : (plain[i]?.text || ""),
          zh: zhParsed.mode === "timed" ? timed[i].text : (plain[i]?.text || "")
        });
        for (let i = timed.length; i < plain.length; i += 1) rows.push({
          start: rows.length ? rows[rows.length - 1].start + d : i * d,
          en: enParsed.mode === "timed" ? "" : plain[i].text,
          zh: zhParsed.mode === "timed" ? "" : plain[i].text
        });
      } else {
        const max = Math.max(enParsed.items.length, zhParsed.items.length);
        for (let i = 0; i < max; i += 1) rows.push({ start: i * d, en: enParsed.items[i]?.text || "", zh: zhParsed.items[i]?.text || "" });
      }
      return rows.filter((r) => r.en || r.zh).map((r, i, a) => ({
        id: i, start: r.start, duration: a[i + 1] ? Math.max(0.8, a[i + 1].start - r.start) : d,
        en: r.en, zh: r.zh, showEn: true, showZh: true
      }));
    }

    function normalizeApiTranscript(data) {
      const root = Array.isArray(data) ? data : Array.isArray(data?.transcript) ? data.transcript : Array.isArray(data?.captions) ? data.captions : [];
      const lines = root.map((x, i) => ({
        id: i, start: Number(x.start ?? x.startTime), duration: Number(x.duration ?? 0),
        en: String(x.text ?? x.caption ?? "").trim(), zh: "", showEn: true, showZh: true
      })).filter((x) => x.en && Number.isFinite(x.start)).sort((a, b) => a.start - b.start);
      for (let i = 0; i < lines.length; i += 1) if (!lines[i].duration || lines[i].duration <= 0) lines[i].duration = lines[i + 1] ? Math.max(0.8, lines[i + 1].start - lines[i].start) : 2.5;
      return lines;
    }

    async function fetchJson(url) { const r = await fetch(url); if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }
    async function fetchTranscript(videoUrl, videoId) {
      const providers = [
        `https://api.supadata.ai/v1/transcript?url=${encodeURIComponent(videoUrl)}`,
        `https://youtubetranscript.com/?server_vid2=${encodeURIComponent(videoId)}`
      ];
      for (const p of providers) { try { const parsed = normalizeApiTranscript(await fetchJson(p)); if (parsed.length) return parsed; } catch {} }
      throw new Error("providers failed");
    }

    function ensurePlayer(videoId) {
      if (!player) {
        player = new YT.Player("player", {
          videoId,
          playerVars: { rel: 0, playsinline: 1 },
          events: { onStateChange: handlePlayerStateChange }
        });
      } else player.loadVideoById(videoId);
    }
    function loadCounts() { try { countsByLine = JSON.parse(localStorage.getItem(countStorageKey()) || "{}") || {}; } catch { countsByLine = {}; } }
    function saveCounts() { try { localStorage.setItem(countStorageKey(), JSON.stringify(countsByLine)); } catch {} }
    function saveBilingual() { try { localStorage.setItem(biStorageKey(), JSON.stringify(state.subtitles)); } catch {} }
    function loadRecentVideos() {
      try {
        const raw = JSON.parse(localStorage.getItem(recentVideosKey) || "[]");
        if (!Array.isArray(raw)) recentVideos = [];
        else recentVideos = raw.map((x) => {
          if (typeof x === "string") return { id: x, title: "", updatedAt: Date.now() };
          if (x && typeof x.id === "string") return {
            id: x.id,
            title: typeof x.title === "string" ? x.title : "",
            updatedAt: Number(x.updatedAt || Date.now())
          };
          return null;
        }).filter(Boolean);
      } catch { recentVideos = []; }
    }
    function saveRecentVideos() {
      try { localStorage.setItem(recentVideosKey, JSON.stringify(recentVideos.slice(0, 12))); } catch {}
    }
    function touchRecentVideo(videoId, title = "") {
      const prev = recentVideos.find((x) => x.id === videoId);
      const entry = { id: videoId, title: title || prev?.title || "", updatedAt: Date.now() };
      recentVideos = [entry, ...recentVideos.filter((x) => x.id !== videoId)].slice(0, 12);
      saveRecentVideos();
      renderRecentVideos();
    }
    function removeRecentVideo(videoId) {
      recentVideos = recentVideos.filter((x) => x.id !== videoId);
      saveRecentVideos();
      renderRecentVideos();
    }
    async function fetchVideoTitleById(videoId) {
      try {
        const url = `https://www.youtube.com/oembed?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${videoId}`)}&format=json`;
        const res = await fetch(url);
        if (!res.ok) return "";
        const data = await res.json();
        return String(data.title || "").trim();
      } catch { return ""; }
    }
    function renderRecentVideos() {
      ui.historyPopover.innerHTML = "";
      ui.historySheetList.innerHTML = "";
      const topFive = recentVideos.slice(0, 5);
      if (!topFive.length) {
        const empty = `<span class="text-sm text-slate-500">尚無練習紀錄</span>`;
        ui.historyPopover.innerHTML = empty;
        ui.historySheetList.innerHTML = empty;
        return;
      }
      topFive.forEach((item, idx) => {

      bar.setAttribute("aria-label", "手機直式底部控制列");

      bar.innerHTML = `
        <div style="display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 400px; padding: 0 10px;">
          <button id="mob-prev" style="font-size: 28px; padding: 10px; color: #000; z-index: 100000; cursor: pointer;">⏪</button>
          <button id="mob-play" style="font-size: 32px; padding: 10px 20px; background: #e0f2fe; border: 2px solid #111827; border-radius: 50px; color: #000; z-index: 100000; cursor: pointer;">⏯️</button>
          <button id="mob-loop" style="font-size: 28px; padding: 10px; color: #000; z-index: 100000; cursor: pointer;">🔁</button>
          <button id="mob-next" style="font-size: 28px; padding: 10px; color: #000; z-index: 100000; cursor: pointer;">⏭️</button>
        </div>
      `;

      const prev = document.getElementById("mob-prev");
      const play = document.getElementById("mob-play");
      const loop = document.getElementById("mob-loop");
      const next = document.getElementById("mob-next");
      if (prev) prev.onclick = () => { if (typeof playPrevious === "function") playPrevious(); };
      if (play) play.onclick = () => { if (typeof togglePlay === "function") togglePlay(); };
      if (loop) loop.onclick = () => { if (typeof toggleCurrentLoop === "function") toggleCurrentLoop(); };
      if (next) next.onclick = () => { if (typeof playNext === "function") playNext(); };

      syncPlayPauseButtons();
    }

    async function loadVideoAndTranscript() {
      const raw = ui.urlInput.value.trim();
      if (!raw) return setStatus("請先貼上 YouTube 網址或影片 ID", true);
      const videoId = parseYouTubeId(raw);
      if (!videoId) return setStatus("網址格式無法辨識 YouTube 影片 ID", true);
      const videoUrl = raw.startsWith("http") ? raw : `https://www.youtube.com/watch?v=${videoId}`;
      currentVideoId = videoId;
      ui.videoIdText.textContent = videoId;
      const fetchedTitle = await fetchVideoTitleById(videoId);
      touchRecentVideo(videoId, fetchedTitle);
      ensurePlayer(videoId);
      cleanupLegacyLineRateState();
      loadUiState();
      syncTranscriptOffset();
      setPlayerHidden(playerHidden);
      setSidebarHidden(sidebarHidden);
      refreshGlobalButtons();
      setGlobalBlur(globalBlurEnabled);
      clearLoop(); clearAutoPause(); completeLockIndex = null; state.currentIndex = null; state.loopCounts = {};
      if (loadBilingual()) {
        updateTrackLabels();
        loadCounts();
        renderSubtitles();
        setRate(state.masterSpeed);
        applyPendingResume(videoId);
        setStatus("已回復此影片的雙語字幕與顯示設定。");
        ensureMobileBottomBar();
        return;
      }
      setStatus("正在載入字幕...");
      try {
        const raw = await fetchTranscript(videoUrl, videoId);
        state.subtitles = raw.map((line, i) => ({ ...line, id: line.id || `sub-${i}` }));
        updateTrackLabels();
        loadCounts();
        saveBilingual();
        renderSubtitles();
        setRate(state.masterSpeed);
        applyPendingResume(videoId);
        setStatus("字幕載入成功。");
        ensureMobileBottomBar();
      }
      catch { state.subtitles = []; renderSubtitles(); setStatus(FAIL_MSG, true); alert(FAIL_MSG); ensureMobileBottomBar(); }
    }

    window.onYouTubeIframeAPIReady = () => {
      playerReady = true;
      clearInterval(tickTimer);
      tickTimer = setInterval(tick, 100);
      setRate(state.masterSpeed);
      ensureMobileBottomBar();
      if (pendingAutoLoadVideoId) {
        ui.urlInput.value = pendingAutoLoadVideoId;
        loadVideoAndTranscript();
      }
    };
    ui.loadBtn.addEventListener("click", loadVideoAndTranscript);
    ui.manualOpenBtn.addEventListener("click", () => ui.manualDialog.showModal());
    ui.manualCancelBtn.addEventListener("click", () => ui.manualDialog.close());
    ui.manualApplyBtn.addEventListener("click", () => { applyManual(); ui.manualDialog.close(); });
    ui.stopLoopBtn.addEventListener("click", () => { clearLoop(); clearAutoPause(); });
    ui.prevBtn.addEventListener("click", playPrevious);
    ui.replayBtn.addEventListener("click", () => { if (state.subtitles.length) jumpTo(Number.isInteger(state.currentIndex) && state.currentIndex >= 0 ? state.currentIndex : 0, { increment: true }); });
    ui.nextBtn.addEventListener("click", playNext);
    ui.mobileLandPrevBtn?.addEventListener("click", playPrevious);
    ui.mobileLandNextBtn?.addEventListener("click", playNext);
    ui.mobileLandPlayPauseBtn?.addEventListener("click", togglePlay);
    ui.mobileLandLoopBtn?.addEventListener("click", toggleCurrentLoop);
    ui.autoPauseToggle.addEventListener("change", (e) => { autoPauseEnabled = Boolean(e.target.checked); clearAutoPause(); setStatus(autoPauseEnabled ? "Auto-Pause 已開啟" : "Auto-Pause 已關閉"); });
    ui.globalShowEnBtn.addEventListener("click", () => applyDisplayMode("L1"));
    ui.globalShowZhBtn.addEventListener("click", () => applyDisplayMode("L2"));
    ui.globalShowBothBtn.addEventListener("click", () => applyDisplayMode("both"));
    ui.globalBlurBtn.addEventListener("click", () => setGlobalBlur(!globalBlurEnabled));
    ui.focusModeBtn.addEventListener("click", () => setFocusMode(!focusModeEnabled));
    ui.hidePlayerBtn.addEventListener("click", () => setPlayerHidden(!playerHidden));
    ui.toggleSidebarBtn.addEventListener("click", () => setSidebarHidden(!sidebarHidden));
    ui.showSidebarBtn.addEventListener("click", () => setSidebarHidden(false));
    ui.resetCountsBtn.addEventListener("click", resetCurrentVideoCounts);
    ui.topPlayPauseBtn.addEventListener("click", () => {
      const i = getActiveLineIndex();
      if (i >= 0) toggleLinePlayback(i);
    });
    ui.themeToggleBtn.addEventListener("click", cycleTheme);
    document.body.addEventListener("click", function (e) {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const subtitle = findSubtitleById(id);
      if (!subtitle) return;
      switch (action) {
        case "jump": {
          const idx = findSubtitleIndexById(id);
          setIntentReveal(idx);
          if (isMobileControlMode()) playSubtitle(subtitle);
          else jumpToSubtitle(subtitle);
          break;
        }
        case "play":
          playSubtitle(subtitle);
          break;
        case "loop":
          toggleLoop(subtitle);
          break;
      }
    });
    document.body.addEventListener("click", function (e) {
      if (!isMobileControlMode()) return;
      const card = e.target.closest(".subtitle-row[data-id]");
      if (!card) return;
      const clickedButton = e.target.closest("button");
      if (clickedButton) return;
      const id = card.getAttribute("data-id");
      const subtitle = findSubtitleById(id);
      if (!subtitle) return;
      const idx = findSubtitleIndexById(id);
      setIntentReveal(idx);
      playSubtitle(subtitle);
    });
    ui.historyToggleBtn.addEventListener("click", () => {
      if (isMobileLayout()) {
        openHistorySheet();
        return;
      }
      historyPinnedOpen = !historyPinnedOpen;
      refreshHistoryAnchorUi();
    });
    ui.historyAnchor.addEventListener("mouseenter", () => {
      if (isMobileLayout() || historyPinnedOpen) return;
      ui.historyAnchor.classList.add("desktop-open");
    });
    ui.historyAnchor.addEventListener("mouseleave", () => {
      if (isMobileLayout() || historyPinnedOpen) return;
      ui.historyAnchor.classList.remove("desktop-open");
    });
    ui.historySheetCloseBtn.addEventListener("click", closeHistorySheet);
    ui.historySheetWrap.addEventListener("click", (e) => {
      if (e.target === ui.historySheetWrap) closeHistorySheet();
    });
    document.addEventListener("click", (e) => {
      if (isMobileLayout()) return;
      if (!ui.historyAnchor.contains(e.target)) {
        historyPinnedOpen = false;
        ui.historyAnchor.classList.remove("desktop-open");
        refreshHistoryAnchorUi();
      }
    });
    ui.clearRecentBtn.addEventListener("click", () => {
      if (!confirm("確定要清空最近練習清單嗎？")) return;
      recentVideos = [];
      saveRecentVideos();
      renderRecentVideos();
    });
    document.addEventListener("keydown", (e) => {
      const activeTag = document.activeElement?.tagName || "";
      if (activeTag === "INPUT" || activeTag === "TEXTAREA") return;
      switch (e.code) {
        case "Space":
          e.preventDefault();
          togglePlay();
          break;
        case "ArrowLeft":
          playPrevious();
          break;
        case "ArrowRight":
          playNext();
          break;
        case "KeyR":
          toggleCurrentLoop();
          break;
      }
    });
    document.querySelectorAll("[data-rate-btn]").forEach((b) => b.addEventListener("click", () => setRate(Number(b.getAttribute("data-rate-btn")))));
    ui.urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") loadVideoAndTranscript(); });
    loadRecentVideos();
    renderRecentVideos();
    setSidebarHidden(sidebarHidden);
    window.addEventListener("resize", syncTranscriptOffset);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", syncTranscriptOffset);
    window.addEventListener("load", ensureMobileBottomBar);
    syncTranscriptOffset();
    ensureMobileBottomBar();
    refreshGlobalButtons();
    let savedTheme = "warm";
    try { savedTheme = localStorage.getItem(themeStorageKey) || "warm"; } catch {}
    applyTheme(savedTheme);
    const lastSession = loadLastSession();
    if (lastSession) {
      pendingAutoLoadVideoId = lastSession.videoId;
      pendingResumeSeconds = lastSession.seconds;
      ui.urlInput.value = pendingAutoLoadVideoId;
      setStatus("已找到上次練習，正在自動載入...");
    }
    document.addEventListener("visibilitychange", () => {
      if (document.hidden && playerReady && player && currentVideoId) saveLastSession(currentVideoId, player.getCurrentTime());
    });
    window.addEventListener("beforeunload", () => {
      if (playerReady && player && currentVideoId) saveLastSession(currentVideoId, player.getCurrentTime());
    });
    if (!lastSession) setStatus("尚未載入影片");
  </script>
</body>
</html>
