<!doctype html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouTube 極致跟讀播放器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0b1020",
            card: "#111827",
            line: "#1f2937"
          }
        }
      }
    };
  </script>
  <style>
    .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    .blind-enabled .subtitle-text { filter: blur(5px); opacity: 0.82; }
    .blind-enabled .subtitle-row:hover .subtitle-text,
    .blind-enabled .subtitle-row.force-reveal .subtitle-text,
    .blind-enabled .subtitle-row:focus-within .subtitle-text { filter: none; opacity: 1; }
  </style>
</head>
<body class="bg-bg text-slate-100 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-5 sm:py-8 safe-bottom">
    <header class="mb-5 sm:mb-6">
      <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">YouTube 極致跟讀播放器</h1>
      <p class="text-slate-300 mt-2 text-sm sm:text-base">句子跳轉、單句循環、Auto-Pause、盲聽、速度切換、練習計數。</p>
    </header>

    <section class="bg-card/90 border border-slate-700 rounded-2xl p-3 sm:p-4 shadow-xl">
      <label for="urlInput" class="block text-sm text-slate-300 mb-2">YouTube 網址</label>
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="urlInput" type="text" placeholder="https://www.youtube.com/watch?v=..." class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-4 text-base focus:outline-none focus:ring-2 focus:ring-cyan-400" />
        <button id="loadBtn" class="min-h-14 sm:min-h-12 rounded-xl bg-cyan-400 text-slate-900 font-semibold px-5 py-3 text-base hover:bg-cyan-300 active:scale-[0.99] transition">載入影片與字幕</button>
      </div>
      <p id="status" class="mt-3 text-sm text-slate-300">尚未載入影片</p>
    </section>

    <section class="mt-4 sm:mt-6 bg-card/90 border border-slate-700 rounded-2xl p-3 sm:p-4 shadow-xl">
      <div class="aspect-video w-full rounded-xl overflow-hidden bg-black">
        <div id="player" class="w-full h-full"></div>
      </div>
      <div class="mt-3 flex flex-wrap items-center gap-2 text-sm">
        <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">影片：<span id="videoIdText">-</span></span>
        <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">字幕行數：<span id="countText">0</span></span>
        <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">目前句：<span id="currentLineText">-</span></span>
        <button id="stopLoopBtn" class="min-h-12 rounded-xl border border-rose-400 text-rose-300 px-4 py-2 hover:bg-rose-500/10">停止循環</button>
      </div>

      <div class="mt-3 grid grid-cols-1 sm:grid-cols-3 gap-2">
        <button id="prevBtn" class="min-h-14 rounded-xl bg-slate-800 border border-slate-600 text-base font-semibold">上一句</button>
        <button id="replayBtn" class="min-h-14 rounded-xl bg-cyan-400 text-slate-900 text-base font-semibold">重新播放本句</button>
        <button id="nextBtn" class="min-h-14 rounded-xl bg-slate-800 border border-slate-600 text-base font-semibold">下一句</button>
      </div>

      <div class="mt-3 flex flex-wrap gap-2">
        <button data-rate-btn="0.75" class="rate-btn min-h-12 px-4 rounded-xl border border-slate-600 bg-slate-800">0.75x</button>
        <button data-rate-btn="1" class="rate-btn min-h-12 px-4 rounded-xl border border-cyan-300 bg-cyan-400 text-slate-900 font-semibold">1x</button>
        <button data-rate-btn="1.25" class="rate-btn min-h-12 px-4 rounded-xl border border-slate-600 bg-slate-800">1.25x</button>
      </div>

      <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2">
        <label class="min-h-12 rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 flex items-center justify-between cursor-pointer">
          <span class="text-sm sm:text-base">Auto-Pause（句尾留白）</span>
          <input id="autoPauseToggle" type="checkbox" class="h-5 w-5" />
        </label>
        <label class="min-h-12 rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 flex items-center justify-between cursor-pointer">
          <span class="text-sm sm:text-base">盲聽模式（字幕模糊）</span>
          <input id="blurToggle" type="checkbox" class="h-5 w-5" checked />
        </label>
      </div>
    </section>

    <section class="mt-4 sm:mt-6">
      <h2 class="text-lg sm:text-xl font-semibold mb-3">所有字幕行</h2>
      <div id="transcriptList" class="space-y-2 blind-enabled"></div>
    </section>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const ui = {
      urlInput: document.getElementById("urlInput"),
      loadBtn: document.getElementById("loadBtn"),
      status: document.getElementById("status"),
      transcriptList: document.getElementById("transcriptList"),
      videoIdText: document.getElementById("videoIdText"),
      countText: document.getElementById("countText"),
      currentLineText: document.getElementById("currentLineText"),
      stopLoopBtn: document.getElementById("stopLoopBtn"),
      prevBtn: document.getElementById("prevBtn"),
      replayBtn: document.getElementById("replayBtn"),
      nextBtn: document.getElementById("nextBtn"),
      autoPauseToggle: document.getElementById("autoPauseToggle"),
      blurToggle: document.getElementById("blurToggle")
    };

    let player = null;
    let playerReady = false;
    let transcript = [];
    let currentLineIndex = -1;
    let activeLoop = null;
    let loopTimer = null;
    let tickTimer = null;
    let autoPauseTimer = null;
    let autoPauseEnabled = false;
    let autoPauseLockIndex = null;
    let completeLockIndex = null;
    let currentVideoId = "";
    let countsByLine = {};
    let currentPlaybackRate = 1;

    function setStatus(message, isError = false) {
      ui.status.textContent = message;
      ui.status.className = "mt-3 text-sm " + (isError ? "text-rose-300" : "text-slate-300");
    }

    function parseYouTubeId(input) {
      try {
        const url = new URL(input);
        if (url.hostname.includes("youtu.be")) return url.pathname.replace("/", "");
        if (url.pathname.startsWith("/shorts/")) return url.pathname.split("/")[2] || "";
        if (url.pathname.startsWith("/embed/")) return url.pathname.split("/")[2] || "";
        return url.searchParams.get("v") || "";
      } catch {
        return "";
      }
    }

    function formatTime(sec) {
      const s = Math.max(0, Math.floor(sec));
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeTranscript(data) {
      const root =
        Array.isArray(data) ? data :
        Array.isArray(data?.transcript) ? data.transcript :
        Array.isArray(data?.captions) ? data.captions :
        Array.isArray(data?.content) ? data.content :
        [];

      const lines = root.map((item, idx) => {
        const text = String(item.text ?? item.transcript ?? item.caption ?? "").trim();
        const start = Number(item.start ?? item.offset ?? item.from ?? item.startTime ?? item.start_time);
        const duration = Number(item.duration ?? item.dur ?? item.length ?? 0);
        return { id: idx, text, start: Number.isFinite(start) ? start : NaN, duration: Number.isFinite(duration) ? duration : 0 };
      }).filter((line) => line.text && Number.isFinite(line.start)).sort((a, b) => a.start - b.start);

      for (let i = 0; i < lines.length; i += 1) {
        if (!lines[i].duration || lines[i].duration <= 0) {
          const next = lines[i + 1];
          lines[i].duration = next ? Math.max(0.8, next.start - lines[i].start) : 2.5;
        }
      }
      return lines;
    }

    async function fetchJson(url, timeoutMs = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { signal: controller.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function fetchTranscript(videoUrl, videoId) {
      const providers = [
        { name: "Supadata", url: `https://api.supadata.ai/v1/transcript?url=${encodeURIComponent(videoUrl)}` },
        { name: "youtubetranscript.com", url: `https://youtubetranscript.com/?server_vid2=${encodeURIComponent(videoId)}` }
      ];

      const errors = [];
      for (const provider of providers) {
        try {
          setStatus(`正在向 ${provider.name} 取得字幕...`);
          const parsed = normalizeTranscript(await fetchJson(provider.url));
          if (parsed.length > 0) return { parsed, provider: provider.name };
          errors.push(`${provider.name}: 回傳格式不含有效字幕`);
        } catch (error) {
          errors.push(`${provider.name}: ${error.message}`);
        }
      }
      throw new Error(errors.join(" | "));
    }

    function ensurePlayer(videoId) {
      if (!player) {
        player = new YT.Player("player", {
          videoId,
          playerVars: { rel: 0, playsinline: 1, modestbranding: 1 }
        });
      } else {
        player.loadVideoById(videoId);
      }
    }

    function getLineKey(line) {
      return `${Math.round(line.start * 1000)}|${line.text}`;
    }

    function getCountStorageKey() {
      return `shadowing-counts:${currentVideoId || "unknown"}`;
    }

    function loadCounts() {
      countsByLine = {};
      try {
        const raw = localStorage.getItem(getCountStorageKey());
        const parsed = raw ? JSON.parse(raw) : {};
        if (parsed && typeof parsed === "object") countsByLine = parsed;
      } catch {
        countsByLine = {};
      }
    }

    function saveCounts() {
      try {
        localStorage.setItem(getCountStorageKey(), JSON.stringify(countsByLine));
      } catch {
        setStatus("無法寫入 localStorage，計數僅保留在本次開啟。", true);
      }
    }

    function updateCountLabel(index) {
      const line = transcript[index];
      if (!line) return;
      const key = getLineKey(line);
      const count = Number(countsByLine[key] || 0);
      const label = document.querySelector(`[data-count-label="${index}"]`);
      if (label) label.textContent = `${count} 次`;
    }

    function incrementCount(index) {
      const line = transcript[index];
      if (!line) return;
      const key = getLineKey(line);
      countsByLine[key] = Number(countsByLine[key] || 0) + 1;
      saveCounts();
      updateCountLabel(index);
    }

    function findCurrentLineIndex(timeSec) {
      for (let i = transcript.length - 1; i >= 0; i -= 1) {
        if (timeSec >= transcript[i].start) return i;
      }
      return -1;
    }

    function setCurrentLine(index, scrollIntoView = false) {
      currentLineIndex = index;
      ui.currentLineText.textContent = index >= 0 ? String(index + 1) : "-";
      document.querySelectorAll("[data-line]").forEach((row) => row.classList.remove("ring-2", "ring-cyan-400"));
      const row = document.querySelector(`[data-line="${index}"]`);
      if (row) {
        row.classList.add("ring-2", "ring-cyan-400");
        if (scrollIntoView) row.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }
    }

    function clearLoop() {
      activeLoop = null;
      if (loopTimer) clearInterval(loopTimer);
      loopTimer = null;
      document.querySelectorAll("[data-loop-btn]").forEach((btn) => {
        btn.classList.remove("bg-emerald-400", "text-slate-900", "border-emerald-300");
      });
    }

    function clearAutoPauseTimer() {
      if (autoPauseTimer) clearTimeout(autoPauseTimer);
      autoPauseTimer = null;
      autoPauseLockIndex = null;
    }

    function jumpToLine(index, options = {}) {
      const { increment = false, clearLoopFirst = true } = options;
      const line = transcript[index];
      if (!line || !playerReady || !player) return;
      if (increment) incrementCount(index);
      if (clearLoopFirst) clearLoop();
      clearAutoPauseTimer();
      completeLockIndex = null;
      setCurrentLine(index, true);
      player.seekTo(line.start, true);
      player.playVideo();
    }

    function loopLine(index) {
      const line = transcript[index];
      if (!line || !playerReady || !player) return;
      activeLoop = { index, start: line.start, end: line.start + line.duration };
      jumpToLine(index, { increment: true, clearLoopFirst: false });
      let cycleCounted = false;
      clearInterval(loopTimer);
      loopTimer = setInterval(() => {
        if (!player || !activeLoop) return;
        const t = player.getCurrentTime();
        if (t < activeLoop.start + 0.12) cycleCounted = false;
        if (t >= activeLoop.end - 0.05) {
          if (!cycleCounted) {
            incrementCount(index);
            cycleCounted = true;
          }
          player.seekTo(activeLoop.start, true);
          player.playVideo();
        }
      }, 140);
    }

    function setPlaybackRate(rate) {
      currentPlaybackRate = rate;
      if (playerReady && player) player.setPlaybackRate(rate);
      document.querySelectorAll("[data-rate-btn]").forEach((btn) => {
        const active = Number(btn.getAttribute("data-rate-btn")) === rate;
        btn.className = active
          ? "rate-btn min-h-12 px-4 rounded-xl border border-cyan-300 bg-cyan-400 text-slate-900 font-semibold"
          : "rate-btn min-h-12 px-4 rounded-xl border border-slate-600 bg-slate-800";
      });
    }

    function applyBlurMode(enabled) {
      if (enabled) ui.transcriptList.classList.add("blind-enabled");
      else ui.transcriptList.classList.remove("blind-enabled");
    }

    function renderTranscript() {
      ui.transcriptList.innerHTML = "";
      ui.countText.textContent = String(transcript.length);
      if (!transcript.length) {
        ui.currentLineText.textContent = "-";
        ui.transcriptList.innerHTML = `<div class="rounded-xl border border-slate-700 bg-card p-4 text-slate-300">沒有可顯示的字幕。請確認影片有公開字幕，或換一個 API 來源再試。</div>`;
        return;
      }

      transcript.forEach((line, index) => {
        const count = Number(countsByLine[getLineKey(line)] || 0);
        const row = document.createElement("div");
        row.className = "subtitle-row rounded-xl border border-slate-700 bg-line/70 p-3 sm:p-4";
        row.setAttribute("data-line", String(index));
        row.innerHTML = `
          <div class="flex flex-col gap-3">
            <div class="flex flex-wrap items-center gap-2">
              <button data-jump-btn="${index}" class="w-full sm:w-auto min-h-12 rounded-xl bg-cyan-400 text-slate-900 px-4 py-2 font-semibold text-base">${formatTime(line.start)} 跳到這句</button>
              <button data-loop-btn="${index}" class="w-full sm:w-auto min-h-12 rounded-xl border border-slate-500 px-4 py-2 text-base">🔁 循環</button>
              <span data-count-label="${index}" class="px-3 py-2 rounded-xl border border-slate-500 text-sm text-slate-200">${count} 次</span>
            </div>
            <button data-text-btn="${index}" class="subtitle-text text-left w-full rounded-xl border border-slate-600 bg-slate-900/70 px-4 py-3 text-base leading-relaxed text-slate-100">${escapeHtml(line.text)}</button>
          </div>
        `;
        row.addEventListener("pointerdown", () => row.classList.add("force-reveal"));
        ["pointerup", "pointercancel", "pointerleave"].forEach((eventName) => {
          row.addEventListener(eventName, () => row.classList.remove("force-reveal"));
        });
        ui.transcriptList.appendChild(row);
      });

      document.querySelectorAll("[data-jump-btn]").forEach((btn) => {
        btn.addEventListener("click", () => jumpToLine(Number(btn.getAttribute("data-jump-btn")), { increment: true }));
      });
      document.querySelectorAll("[data-text-btn]").forEach((btn) => {
        btn.addEventListener("click", () => jumpToLine(Number(btn.getAttribute("data-text-btn")), { increment: true }));
      });
      document.querySelectorAll("[data-loop-btn]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.getAttribute("data-loop-btn"));
          if (activeLoop && activeLoop.index === idx) {
            clearLoop();
            return;
          }
          clearLoop();
          clearAutoPauseTimer();
          btn.classList.add("bg-emerald-400", "text-slate-900", "border-emerald-300");
          loopLine(idx);
        });
      });
    }

    function stepLine(delta) {
      if (!transcript.length) return;
      const base = currentLineIndex >= 0 ? currentLineIndex : 0;
      const next = Math.max(0, Math.min(transcript.length - 1, base + delta));
      jumpToLine(next, { increment: true });
    }

    function replayCurrentLine() {
      if (!transcript.length) return;
      jumpToLine(currentLineIndex >= 0 ? currentLineIndex : 0, { increment: true });
    }

    function handleLineEndCount(idx, timeSec) {
      if (idx < 0 || !transcript[idx]) return;
      const lineEnd = transcript[idx].start + transcript[idx].duration;
      if (timeSec >= lineEnd - 0.05 && completeLockIndex !== idx) {
        completeLockIndex = idx;
        incrementCount(idx);
      }
      if (idx !== completeLockIndex && timeSec < lineEnd - 0.2) completeLockIndex = null;
    }

    function handleAutoPause(idx, timeSec) {
      if (!autoPauseEnabled || activeLoop || idx < 0 || !transcript[idx]) return;
      if (typeof player.getPlayerState === "function" && player.getPlayerState() !== YT.PlayerState.PLAYING) return;
      const line = transcript[idx];
      const lineEnd = line.start + line.duration;
      if (timeSec >= lineEnd - 0.05 && autoPauseLockIndex !== idx) {
        autoPauseLockIndex = idx;
        player.pauseVideo();
        const waitMs = Math.max(400, line.duration * 1200);
        clearTimeout(autoPauseTimer);
        autoPauseTimer = setTimeout(() => {
          if (!autoPauseEnabled) return;
          const next = idx + 1;
          if (next >= transcript.length) {
            setStatus("Auto-Pause 已播到最後一句。");
            return;
          }
          jumpToLine(next, { increment: false });
        }, waitMs);
      }
    }

    function tick() {
      if (!playerReady || !player || !transcript.length) return;
      const t = player.getCurrentTime();
      const idx = findCurrentLineIndex(t);
      if (idx >= 0 && idx !== currentLineIndex) setCurrentLine(idx, false);
      if (!activeLoop) handleLineEndCount(idx, t);
      handleAutoPause(idx, t);
    }

    async function loadVideoAndTranscript() {
      const url = ui.urlInput.value.trim();
      if (!url) return setStatus("請先貼上 YouTube 網址", true);
      const videoId = parseYouTubeId(url);
      if (!videoId) return setStatus("網址格式無法辨識 YouTube 影片 ID", true);

      currentVideoId = videoId;
      ui.videoIdText.textContent = videoId;
      setStatus("正在載入影片...");
      ensurePlayer(videoId);
      clearLoop();
      clearAutoPauseTimer();
      completeLockIndex = null;
      currentLineIndex = -1;

      try {
        const result = await fetchTranscript(url, videoId);
        transcript = result.parsed;
        loadCounts();
        renderTranscript();
        setPlaybackRate(currentPlaybackRate);
        setStatus(`字幕載入成功（來源：${result.provider}）`);
      } catch (error) {
        transcript = [];
        renderTranscript();
        setStatus(`字幕載入失敗：${error.message}`, true);
      }
    }

    window.onYouTubeIframeAPIReady = () => {
      playerReady = true;
      clearInterval(tickTimer);
      tickTimer = setInterval(tick, 180);
      setPlaybackRate(currentPlaybackRate);
    };

    ui.loadBtn.addEventListener("click", loadVideoAndTranscript);
    ui.stopLoopBtn.addEventListener("click", () => {
      clearLoop();
      clearAutoPauseTimer();
    });
    ui.prevBtn.addEventListener("click", () => stepLine(-1));
    ui.replayBtn.addEventListener("click", replayCurrentLine);
    ui.nextBtn.addEventListener("click", () => stepLine(1));
    ui.autoPauseToggle.addEventListener("change", (event) => {
      autoPauseEnabled = Boolean(event.target.checked);
      clearAutoPauseTimer();
      setStatus(autoPauseEnabled ? "Auto-Pause 已開啟" : "Auto-Pause 已關閉");
    });
    ui.blurToggle.addEventListener("change", (event) => applyBlurMode(Boolean(event.target.checked)));
    document.querySelectorAll("[data-rate-btn]").forEach((btn) => {
      btn.addEventListener("click", () => setPlaybackRate(Number(btn.getAttribute("data-rate-btn"))));
    });
    ui.urlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadVideoAndTranscript();
    });

    applyBlurMode(true);
  </script>
</body>
</html>
