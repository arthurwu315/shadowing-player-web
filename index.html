<!doctype html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouTube 跟讀播放器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { bg: "#0b1020", card: "#111827", line: "#1f2937" } } } };
  </script>
  <style>
    body {
      background: #FDFBF7 !important;
      color: #2B2D42 !important;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
    }
    #app-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .top-pane { flex: 0 0 auto; max-height: 60vh; overflow: auto; }
    .bottom-pane { flex: 1 1 auto; overflow-y: auto; min-height: 0; }
    .pixel-title, .count-badge { font-family: "VT323", monospace; letter-spacing: 0.03em; }
    section, dialog, .subtitle-row, button, .pill-btn, input, textarea, label {
      border-radius: 0 !important;
      border: 2px solid #000 !important;
      box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 1) !important;
    }
    section, dialog, .subtitle-row, label { background: #ffffff !important; }
    input, textarea { background: #fffdf9 !important; color: #2B2D42 !important; }
    button, .pill-btn, .subtitle-text, label, p, .text-sm, .text-base {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif !important;
      font-size: max(16px, 1rem) !important;
      line-height: 1.6 !important;
    }
    button, .pill-btn {
      transition: transform 120ms ease, filter 120ms ease, background-color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      background: #A3B18A !important;
      color: #1f2937 !important;
      font-weight: 700;
      padding-left: 0.9rem !important;
      padding-right: 0.9rem !important;
    }
    button:hover, .pill-btn:hover { filter: brightness(0.92); opacity: 0.8; transform: translateY(-1px); }
    button:active, .pill-btn:active {
      transform: translate(1px, 1px) scale(0.95);
      box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 1) !important;
    }
    #loadBtn, #prevBtn, #replayBtn, #nextBtn, [data-rate-btn], [data-line-rate], [data-playpause-btn], [data-jump-btn] { background: #A3B18A !important; }
    #globalShowEnBtn, #globalShowZhBtn, #globalShowBothBtn, [data-toggle-en], [data-toggle-zh] { background: #83C5BE !important; }
    #stopLoopBtn, [data-loop-btn], #manualCancelBtn, #lineRateResetBtn { background: #E29578 !important; }
    .subtitle-text { color: #2B2D42 !important; background: #fffaf3 !important; border-color: #000 !important; }
    .subtitle-row .text-sky-200 { color: #2B2D42 !important; }
    .count-badge { background: #f5efe5 !important; color: #2B2D42 !important; }
    .subtitle-row { scroll-margin-block: 35vh; }
    .control-tower {
      position: relative;
      transition: all 0.3s ease-in-out;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(253, 251, 247, 0.82) !important;
      border-bottom: 2px solid #000 !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }
    .control-panel { max-height: 999px; overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.2s ease; }
    .control-tower.compact .control-panel { max-height: 0; opacity: 0; margin: 0; border: 0 !important; box-shadow: none !important; }
    .player-shell.player-hidden { display: none; }
    .tower-global-row {
      max-height: 74px;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      align-items: center;
    }
    .pixel-group {
      border: 2px solid #000;
      background: #ffffff;
      box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 1);
      padding: 0.5rem;
    }
    .pixel-group-accent {
      border: 2px solid #000;
      background: #f0f5f4;
      box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 1);
      padding: 0.5rem;
    }
    @media (max-width: 640px) { .control-panel { max-height: 80px; overflow: auto; } }
    .pill-btn {
      min-height: 44px;
      border-radius: 9999px !important;
      border: 2px solid #000;
      background: #A3B18A;
      padding: 0.55rem 0.95rem;
      font-size: 0.9rem;
      line-height: 1.1rem;
      white-space: nowrap;
    }
    .global-blur .subtitle-text { filter: blur(5px); opacity: 0.82; }
    .global-blur .subtitle-row.is-current .subtitle-text,
    .global-blur .subtitle-row:hover .subtitle-text,
    .global-blur .subtitle-row.force-reveal .subtitle-text,
    .global-blur .subtitle-row:focus-within .subtitle-text { filter: none; opacity: 1; }
    .subtitle-row.is-current {
      border: 3px solid #3b82f6 !important;
      background: rgba(255, 221, 210, 0.5) !important;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.2), 0 14px 34px rgba(59, 130, 246, 0.34);
      transform: scale(1.02);
      position: relative;
      animation: border-breathe 2.4s ease-in-out infinite;
    }
    .subtitle-row.is-current::before {
      content: "";
      position: absolute;
      left: -3px;
      top: 0;
      bottom: 0;
      width: 5px;
      background: #3b82f6;
    }
    @keyframes border-breathe {
      0%, 100% { box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.25), 0 10px 22px rgba(59, 130, 246, 0.22); }
      50% { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.4), 0 14px 30px rgba(59, 130, 246, 0.35); }
    }
    .bottom-pane::-webkit-scrollbar { width: 10px; }
    .bottom-pane::-webkit-scrollbar-track { background: #d9d9d9; border-left: 2px solid #000; }
    .bottom-pane::-webkit-scrollbar-thumb { background: #2f2f2f; border: 2px solid #000; }
    .bottom-pane { scrollbar-color: #2f2f2f #d9d9d9; scrollbar-width: thin; }
    @media (min-width: 1024px) {
      .top-pane { max-height: 50vh; }
      .top-pane-inner { max-width: 1100px; margin: 0 auto; width: 100%; }
      #transcriptList { max-width: 56rem; margin: 0 auto; }
      #app-container {
        display: grid !important;
        grid-template-columns: minmax(360px, 42vw) 1fr;
        grid-template-rows: 100vh;
      }
      .top-pane {
        max-height: none;
        height: 100vh;
        border-right: 2px solid #000;
      }
      .bottom-pane {
        height: 100vh;
      }
    }
    @media (orientation: landscape) and (max-height: 560px) {
      #controlTower { padding: 0.4rem !important; }
      #controlTower .aspect-video { max-height: 34vh; }
      #controlTower .control-panel { max-height: 72px; }
      #controlTower .min-h-12, #controlTower .min-h-14 { min-height: 2.1rem !important; padding-top: 0.25rem !important; padding-bottom: 0.25rem !important; }
      #controlTower .pill-btn { min-height: 34px; font-size: 0.8rem; padding: 0.35rem 0.6rem; }
      #controlTower .grid { gap: 0.35rem !important; }
    }
  </style>
</head>
<body class="bg-bg text-slate-100 min-h-screen">
  <div id="app-container" class="h-screen flex flex-col">
    <div class="top-pane flex-none px-4 pt-4 sm:pt-6">
      <div class="top-pane-inner">
    <header class="mb-5 sm:mb-6">
      <h1 class="pixel-title text-2xl sm:text-3xl font-bold tracking-tight">YouTube 跟讀播放器</h1>
      <p class="text-slate-300 mt-2 text-sm sm:text-base">雙語字幕、句子跳轉、單句循環、Auto-Pause、顯示控制、計數器。</p>
    </header>

    <section class="bg-card/90 border border-slate-700 rounded-2xl p-3 sm:p-4 shadow-xl">
      <label for="urlInput" class="block text-sm text-slate-300 mb-2">YouTube 網址或影片 ID</label>
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="urlInput" type="text" placeholder="https://www.youtube.com/watch?v=... 或 11 碼 ID" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-4 text-base focus:outline-none focus:ring-2 focus:ring-cyan-400" />
        <button id="loadBtn" class="min-h-14 sm:min-h-12 rounded-xl bg-cyan-400 text-slate-900 font-semibold px-5 py-3 text-base hover:bg-cyan-300">載入影片與字幕</button>
      </div>
      <div class="mt-3">
        <button id="manualOpenBtn" class="w-full sm:w-auto min-h-12 rounded-xl border border-cyan-400 text-cyan-300 px-4 py-2 hover:bg-cyan-500/10">手動貼上雙語字幕</button>
      </div>
      <p id="status" class="mt-3 text-sm text-slate-300">尚未載入影片</p>
    </section>

    <section id="controlTower" class="control-tower mt-4 sm:mt-6 rounded-2xl p-3 sm:p-4">
      <div id="playerShell" class="player-shell bg-card/70 border border-slate-700 rounded-2xl p-2 sm:p-3">
        <div class="aspect-video w-full rounded-xl overflow-hidden bg-black"><div id="player" class="w-full h-full"></div></div>
      </div>
      <div id="controlPanel" class="control-panel mt-2 bg-card/70 border border-slate-700 rounded-2xl p-2 sm:p-3">
        <div class="mt-3 flex flex-wrap items-center gap-2 text-sm">
          <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">影片：<span id="videoIdText">-</span></span>
          <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">字幕行數：<span id="countText">0</span></span>
          <span class="px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">目前句：<span id="currentLineText">-</span></span>
          <button id="stopLoopBtn" class="min-h-12 rounded-xl border border-rose-400 text-rose-300 px-4 py-2">停止循環</button>
        </div>
        <div class="mt-3 pixel-group">
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
            <button id="prevBtn" class="min-h-14 rounded-xl bg-slate-800 border border-slate-600 text-base font-semibold">上一句</button>
            <button id="replayBtn" class="min-h-14 rounded-xl bg-cyan-400 text-slate-900 text-base font-semibold">重新播放本句</button>
            <button id="nextBtn" class="min-h-14 rounded-xl bg-slate-800 border border-slate-600 text-base font-semibold">下一句</button>
          </div>
        </div>
        <div class="mt-3 flex flex-wrap gap-2">
          <button data-rate-btn="0.75" class="rate-btn min-h-12 px-4 rounded-xl border border-slate-600 bg-slate-800">0.75x</button>
          <button data-rate-btn="1" class="rate-btn min-h-12 px-4 rounded-xl border border-cyan-300 bg-cyan-400 text-slate-900 font-semibold">1x</button>
          <button data-rate-btn="1.25" class="rate-btn min-h-12 px-4 rounded-xl border border-slate-600 bg-slate-800">1.25x</button>
        </div>
        <div class="mt-3">
          <label class="min-h-12 rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 flex items-center justify-between">
            <span>Auto-Pause（句尾留白）</span><input id="autoPauseToggle" type="checkbox" class="h-5 w-5" />
          </label>
        </div>
      </div>
      <div class="control-panel mt-2 border-t border-slate-600/50 pt-2 pixel-group-accent">
        <h2 class="text-base sm:text-lg font-semibold mb-3">全局顯示控制面板</h2>
        <div class="tower-global-row flex gap-2">
          <button id="globalShowEnBtn" class="pill-btn">🇬🇧 英文</button>
          <button id="globalShowZhBtn" class="pill-btn">🇨🇳 中文</button>
          <button id="globalShowBothBtn" class="pill-btn">🌐 雙語</button>
          <button id="globalBlurBtn" class="pill-btn">🕶️ 盲聽</button>
          <button id="focusModeBtn" class="pill-btn">🎯 聚焦</button>
          <button id="hidePlayerBtn" class="pill-btn">🎬 隱藏播放器</button>
          <button id="lineRateResetBtn" class="pill-btn">⏩ 下一句回 1x</button>
        </div>
      </div>
    </section>

      </div>
    </div>

    <section id="transcriptSection" class="bottom-pane flex-1 overflow-y-auto px-4 pb-4 pt-3">
      <h2 class="text-lg sm:text-xl font-semibold mb-3">所有字幕行</h2>
      <div id="transcriptList" class="space-y-2"></div>
    </section>
  </div>

  <dialog id="manualDialog" class="w-[96%] max-w-4xl rounded-2xl bg-slate-900 text-slate-100 border border-slate-700 p-0">
    <div class="p-4 sm:p-5">
      <h3 class="text-lg font-semibold">手動貼上雙語字幕（任意語言）</h3>
      <p class="text-sm text-slate-300 mt-1">兩欄可貼入任意語言；若兩邊有時間戳記會按時間配對，純文字則按行數對齊。</p>
      <label for="manualDurationInput" class="block text-sm text-slate-300 mt-4 mb-2">純文字模式每句秒數</label>
      <input id="manualDurationInput" type="number" step="0.1" min="0.5" value="2.5" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-3 py-3 text-base" />
      <div class="mt-4 grid grid-cols-1 lg:grid-cols-2 gap-3">
        <div>
          <label for="manualEnInput" class="block text-sm text-slate-300 mb-2">稿件 A（L1）</label>
          <textarea id="manualEnInput" rows="12" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-3 py-3 text-sm" placeholder="0:03&#10;Hello&#10;0:08&#10;How are you?"></textarea>
        </div>
        <div>
          <label for="manualZhInput" class="block text-sm text-slate-300 mb-2">稿件 B（L2）</label>
          <textarea id="manualZhInput" rows="12" class="w-full rounded-xl bg-slate-950 border border-slate-700 px-3 py-3 text-sm" placeholder="0:03&#10;哈囉&#10;0:08&#10;你最近好嗎？"></textarea>
        </div>
      </div>
      <div class="mt-4 flex flex-col sm:flex-row gap-2 sm:justify-end">
        <button id="manualCancelBtn" class="min-h-12 rounded-xl border border-slate-500 px-4 py-2">取消</button>
        <button id="manualApplyBtn" class="min-h-12 rounded-xl bg-cyan-400 text-slate-900 px-5 py-2 font-semibold">套用雙語字幕</button>
      </div>
    </div>
  </dialog>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const ui = {
      urlInput: document.getElementById("urlInput"),
      loadBtn: document.getElementById("loadBtn"),
      manualOpenBtn: document.getElementById("manualOpenBtn"),
      status: document.getElementById("status"),
      transcriptList: document.getElementById("transcriptList"),
      videoIdText: document.getElementById("videoIdText"),
      countText: document.getElementById("countText"),
      currentLineText: document.getElementById("currentLineText"),
      stopLoopBtn: document.getElementById("stopLoopBtn"),
      prevBtn: document.getElementById("prevBtn"),
      replayBtn: document.getElementById("replayBtn"),
      nextBtn: document.getElementById("nextBtn"),
      autoPauseToggle: document.getElementById("autoPauseToggle"),
      globalShowEnBtn: document.getElementById("globalShowEnBtn"),
      globalShowZhBtn: document.getElementById("globalShowZhBtn"),
      globalShowBothBtn: document.getElementById("globalShowBothBtn"),
      globalBlurBtn: document.getElementById("globalBlurBtn"),
      focusModeBtn: document.getElementById("focusModeBtn"),
      hidePlayerBtn: document.getElementById("hidePlayerBtn"),
      lineRateResetBtn: document.getElementById("lineRateResetBtn"),
      controlTower: document.getElementById("controlTower"),
      controlPanel: document.getElementById("controlPanel"),
      transcriptSection: document.getElementById("transcriptSection"),
      playerShell: document.getElementById("playerShell"),
      manualDialog: document.getElementById("manualDialog"),
      manualDurationInput: document.getElementById("manualDurationInput"),
      manualEnInput: document.getElementById("manualEnInput"),
      manualZhInput: document.getElementById("manualZhInput"),
      manualCancelBtn: document.getElementById("manualCancelBtn"),
      manualApplyBtn: document.getElementById("manualApplyBtn")
    };

    let player = null, playerReady = false, transcript = [], currentLineIndex = -1;
    let activeLoop = null, loopTimer = null, tickTimer = null, autoPauseTimer = null;
    let autoPauseEnabled = false, autoPauseLockIndex = null, completeLockIndex = null;
    let currentVideoId = "", countsByLine = {}, currentPlaybackRate = 1;
    let globalLangMode = "both";
    let globalBlurEnabled = false;
    let focusModeEnabled = false;
    let autoResetLineRate = true;
    let preferredSlowRate = 0.7;
    let lineRateOverrideFrom = -1;
    let lineRateOverrideActive = false;
    let towerCollapsed = false;
    let lastScrollY = 0;
    let playerHidden = false;
    let trackLabelA = "L1";
    let trackLabelB = "L2";

    const FAIL_MSG = "自動抓取受限，請點擊下方按鈕手動貼入英/中雙語講稿以開始練習";
    const esc = (t) => String(t || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\"","&quot;").replaceAll("'","&#039;");
    const countKey = (line) => `${Math.round(line.start * 1000)}|${line.en || ""}|${line.zh || ""}`;
    const countStorageKey = () => `shadowing-counts:${currentVideoId || "unknown"}`;
    const biStorageKey = () => `shadowing-bilingual:${currentVideoId || "unknown"}`;
    const uiStorageKey = () => `shadowing-ui:${currentVideoId || "unknown"}`;
    const setStatus = (msg, err = false) => {
      ui.status.textContent = msg;
      ui.status.className = "mt-3 text-sm " + (err ? "text-rose-300" : "text-slate-300");
    };

    function parseYouTubeId(input) {
      const raw = String(input || "").trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
      try {
        const u = new URL(raw);
        if (u.hostname.includes("youtu.be")) return u.pathname.replace("/", "");
        if (u.pathname.startsWith("/shorts/") || u.pathname.startsWith("/embed/")) return u.pathname.split("/")[2] || "";
        return u.searchParams.get("v") || "";
      } catch { return ""; }
    }
    function fmt(sec) { const s = Math.max(0, Math.floor(sec)); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`; }
    function toSec(raw) {
      const p = String(raw).trim().split(":").map(Number);
      if (!p.length || p.some((n) => !Number.isFinite(n))) return NaN;
      if (p.length === 2) return p[0] * 60 + p[1];
      if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
      return NaN;
    }
    function isTimeOnly(line) { return /^\d{1,2}:\d{2}(?::\d{2})?$/.test(line.trim()); }

    function parseScript(rawText, secPerLine) {
      const lines = String(rawText || "").split(/\r?\n/).map((x) => x.trim()).filter(Boolean);
      if (!lines.length) return { mode: "empty", items: [] };
      const timedInline = /^(\d{1,2}:\d{2}(?::\d{2})?)(?:[.,]\d+)?\s+(.+)$/;
      if (lines.some((line) => timedInline.test(line))) {
        const items = lines.map((line) => {
          const m = line.match(timedInline);
          if (!m) return null;
          const s = toSec(m[1]);
          return Number.isFinite(s) ? { start: s, text: m[2].trim() } : null;
        }).filter(Boolean).sort((a, b) => a.start - b.start);
        return { mode: "timed", items };
      }
      if (lines.some((line) => isTimeOnly(line))) {
        const items = [];
        for (let i = 0; i < lines.length; i += 1) {
          if (!isTimeOnly(lines[i])) continue;
          const s = toSec(lines[i]);
          let j = i + 1;
          while (j < lines.length && isTimeOnly(lines[j])) j += 1;
          if (!Number.isFinite(s) || j >= lines.length) continue;
          items.push({ start: s, text: lines[j] });
          i = j;
        }
        items.sort((a, b) => a.start - b.start);
        return { mode: "timed", items };
      }
      const d = Math.max(0.5, Number(secPerLine || 2.5));
      return { mode: "plain", items: lines.map((text, i) => ({ start: i * d, text })) };
    }

    function alignBilingual(enParsed, zhParsed, secPerLine) {
      const d = Math.max(0.8, Number(secPerLine || 2.5));
      const rows = [];
      if (enParsed.mode === "timed" && zhParsed.mode === "timed") {
        const used = new Set();
        for (const enItem of enParsed.items) {
          let best = -1, diff = Infinity;
          for (let i = 0; i < zhParsed.items.length; i += 1) {
            if (used.has(i)) continue;
            const cur = Math.abs(zhParsed.items[i].start - enItem.start);
            if (cur < diff) { diff = cur; best = i; }
          }
          if (best >= 0) used.add(best);
          rows.push({ start: enItem.start, en: enItem.text, zh: best >= 0 ? zhParsed.items[best].text : "" });
        }
        for (let i = 0; i < zhParsed.items.length; i += 1) if (!used.has(i)) rows.push({ start: zhParsed.items[i].start, en: "", zh: zhParsed.items[i].text });
        rows.sort((a, b) => a.start - b.start);
      } else if (enParsed.mode === "timed" || zhParsed.mode === "timed") {
        const timed = enParsed.mode === "timed" ? enParsed.items : zhParsed.items;
        const plain = enParsed.mode === "timed" ? zhParsed.items : enParsed.items;
        for (let i = 0; i < timed.length; i += 1) rows.push({
          start: timed[i].start,
          en: enParsed.mode === "timed" ? timed[i].text : (plain[i]?.text || ""),
          zh: zhParsed.mode === "timed" ? timed[i].text : (plain[i]?.text || "")
        });
        for (let i = timed.length; i < plain.length; i += 1) rows.push({
          start: rows.length ? rows[rows.length - 1].start + d : i * d,
          en: enParsed.mode === "timed" ? "" : plain[i].text,
          zh: zhParsed.mode === "timed" ? "" : plain[i].text
        });
      } else {
        const max = Math.max(enParsed.items.length, zhParsed.items.length);
        for (let i = 0; i < max; i += 1) rows.push({ start: i * d, en: enParsed.items[i]?.text || "", zh: zhParsed.items[i]?.text || "" });
      }
      return rows.filter((r) => r.en || r.zh).map((r, i, a) => ({
        id: i, start: r.start, duration: a[i + 1] ? Math.max(0.8, a[i + 1].start - r.start) : d,
        en: r.en, zh: r.zh, showEn: true, showZh: true
      }));
    }

    function normalizeApiTranscript(data) {
      const root = Array.isArray(data) ? data : Array.isArray(data?.transcript) ? data.transcript : Array.isArray(data?.captions) ? data.captions : [];
      const lines = root.map((x, i) => ({
        id: i, start: Number(x.start ?? x.startTime), duration: Number(x.duration ?? 0),
        en: String(x.text ?? x.caption ?? "").trim(), zh: "", showEn: true, showZh: true
      })).filter((x) => x.en && Number.isFinite(x.start)).sort((a, b) => a.start - b.start);
      for (let i = 0; i < lines.length; i += 1) if (!lines[i].duration || lines[i].duration <= 0) lines[i].duration = lines[i + 1] ? Math.max(0.8, lines[i + 1].start - lines[i].start) : 2.5;
      return lines;
    }

    async function fetchJson(url) { const r = await fetch(url); if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }
    async function fetchTranscript(videoUrl, videoId) {
      const providers = [
        `https://api.supadata.ai/v1/transcript?url=${encodeURIComponent(videoUrl)}`,
        `https://youtubetranscript.com/?server_vid2=${encodeURIComponent(videoId)}`
      ];
      for (const p of providers) { try { const parsed = normalizeApiTranscript(await fetchJson(p)); if (parsed.length) return parsed; } catch {} }
      throw new Error("providers failed");
    }

    function ensurePlayer(videoId) {
      if (!player) {
        player = new YT.Player("player", {
          videoId,
          playerVars: { rel: 0, playsinline: 1 },
          events: { onStateChange: handlePlayerStateChange }
        });
      } else player.loadVideoById(videoId);
    }
    function loadCounts() { try { countsByLine = JSON.parse(localStorage.getItem(countStorageKey()) || "{}") || {}; } catch { countsByLine = {}; } }
    function saveCounts() { try { localStorage.setItem(countStorageKey(), JSON.stringify(countsByLine)); } catch {} }
    function saveBilingual() { try { localStorage.setItem(biStorageKey(), JSON.stringify(transcript)); } catch {} }
    function loadBilingual() {
      try {
        const data = JSON.parse(localStorage.getItem(biStorageKey()) || "[]");
        if (!Array.isArray(data) || !data.length) return false;
        transcript = data.map((x, i) => ({
          id: i, start: Number(x.start), duration: Math.max(0.8, Number(x.duration || 2.5)),
          en: String(x.en || ""), zh: String(x.zh || ""),
          showEn: x.showEn !== false, showZh: x.showZh !== false
        })).filter((x) => Number.isFinite(x.start) && (x.en || x.zh));
        return transcript.length > 0;
      } catch { return false; }
    }
    function saveUiState() {
      const payload = {
        langMode: globalLangMode,
        blur: globalBlurEnabled,
        focus: focusModeEnabled,
        autoResetLineRate,
        preferredSlowRate,
        playerHidden
      };
      try { localStorage.setItem(uiStorageKey(), JSON.stringify(payload)); } catch {}
    }
    function loadUiState() {
      try {
        const s = JSON.parse(localStorage.getItem(uiStorageKey()) || "{}");
        if (s.langMode === "en" || s.langMode === "zh" || s.langMode === "both" || s.langMode === "custom") globalLangMode = s.langMode;
        if (typeof s.blur === "boolean") globalBlurEnabled = s.blur;
        if (typeof s.focus === "boolean") focusModeEnabled = s.focus;
        if (typeof s.autoResetLineRate === "boolean") autoResetLineRate = s.autoResetLineRate;
        if (Number(s.preferredSlowRate) > 0) preferredSlowRate = Number(s.preferredSlowRate);
        if (typeof s.playerHidden === "boolean") playerHidden = s.playerHidden;
      } catch {}
    }
    function detectTrackLabel(sample, fallback) {
      const text = String(sample || "");
      if (!text) return fallback;
      const cjk = (text.match(/[\u4e00-\u9fff]/g) || []).length;
      const latin = (text.match(/[A-Za-z]/g) || []).length;
      if (cjk > latin * 0.6) return "CN";
      if (latin > cjk) return "EN";
      return fallback;
    }
    function updateTrackLabels() {
      const sampleA = transcript.find((x) => x.en)?.en || "";
      const sampleB = transcript.find((x) => x.zh)?.zh || "";
      trackLabelA = detectTrackLabel(sampleA, "L1");
      trackLabelB = detectTrackLabel(sampleB, "L2");
      if (trackLabelA === trackLabelB) { trackLabelA = "L1"; trackLabelB = "L2"; }
    }
    function refreshGlobalButtons() {
      const active = "pill-btn border-cyan-300 bg-cyan-400 text-slate-900 font-semibold";
      const normal = "pill-btn border-slate-600 bg-slate-800";
      ui.globalShowEnBtn.className = globalLangMode === "en" ? active : normal;
      ui.globalShowZhBtn.className = globalLangMode === "zh" ? active : normal;
      ui.globalShowBothBtn.className = globalLangMode === "both" ? active : normal;
      ui.globalBlurBtn.className = globalBlurEnabled ? active : normal;
      ui.focusModeBtn.className = focusModeEnabled ? active : normal;
      ui.hidePlayerBtn.className = playerHidden ? active : normal;
      ui.lineRateResetBtn.className = autoResetLineRate ? active : normal;
      ui.globalShowEnBtn.textContent = `🅰️ ${trackLabelA}`;
      ui.globalShowZhBtn.textContent = `🅱️ ${trackLabelB}`;
      ui.globalShowBothBtn.textContent = `🌐 ${trackLabelA}+${trackLabelB}`;
      ui.hidePlayerBtn.textContent = playerHidden ? "🎬 顯示播放器" : "🎬 隱藏播放器";
      ui.lineRateResetBtn.textContent = autoResetLineRate ? "⏩ 下一句回 1x：開" : "⏩ 下一句回 1x：關";
    }
    function setTowerCollapsed(collapsed) {
      towerCollapsed = Boolean(collapsed);
      if (towerCollapsed) ui.controlTower.classList.add("compact");
      else ui.controlTower.classList.remove("compact");
      syncTranscriptOffset();
    }
    function applyGlobalLang(mode) {
      globalLangMode = mode;
      transcript = transcript.map((line) => ({
        ...line,
        showEn: mode === "en" || mode === "both",
        showZh: mode === "zh" || mode === "both"
      }));
      saveBilingual();
      saveUiState();
      refreshGlobalButtons();
      render();
    }
    function setGlobalBlur(on) {
      globalBlurEnabled = Boolean(on);
      if (globalBlurEnabled) ui.transcriptList.classList.add("global-blur");
      else ui.transcriptList.classList.remove("global-blur");
      saveUiState();
      refreshGlobalButtons();
    }
    function setFocusMode(on) {
      focusModeEnabled = Boolean(on);
      saveUiState();
      refreshGlobalButtons();
      render();
    }
    function setAutoResetLineRate(on) {
      autoResetLineRate = Boolean(on);
      if (!autoResetLineRate) lineRateOverrideActive = false;
      saveUiState();
      refreshGlobalButtons();
    }
    function setPlayerHidden(on) {
      playerHidden = Boolean(on);
      if (playerHidden) ui.playerShell.classList.add("player-hidden");
      else ui.playerShell.classList.remove("player-hidden");
      saveUiState();
      refreshGlobalButtons();
    }

    function inc(i) {
      const line = transcript[i];
      if (!line) return;
      const k = countKey(line);
      countsByLine[k] = Number(countsByLine[k] || 0) + 1;
      saveCounts();
      const n = document.querySelector(`[data-count-label="${i}"]`);
      if (n) n.textContent = `${countsByLine[k]} 次`;
    }
    function findIdx(t) { for (let i = transcript.length - 1; i >= 0; i -= 1) if (t >= transcript[i].start) return i; return -1; }
    function applyCurrentHighlight() {
      document.querySelectorAll("[data-line]").forEach((r) => r.classList.remove("ring-2", "ring-cyan-400", "is-current"));
      const row = document.querySelector(`[data-line="${currentLineIndex}"]`);
      if (row) row.classList.add("ring-2", "ring-cyan-400", "is-current");
    }
    function scrollCurrentIntoCenter() {
      const currentCard = document.querySelector(`[data-line="${currentLineIndex}"]`);
      if (!currentCard) return;
      currentCard.scrollIntoView({ behavior: "smooth", block: "center" });
    }
    function syncTranscriptOffset() {
      ui.transcriptSection.style.paddingTop = "12px";
    }
    function setCurrent(i) {
      const changed = i !== currentLineIndex;
      currentLineIndex = i;
      ui.currentLineText.textContent = i >= 0 ? String(i + 1) : "-";
      if (focusModeEnabled) render();
      else applyCurrentHighlight();
      syncPlayPauseButtons();
      if (changed && i >= 0) scrollCurrentIntoCenter();
    }
    function clearLoop() {
      activeLoop = null;
      if (loopTimer) clearInterval(loopTimer);
      loopTimer = null;
      document.querySelectorAll("[data-loop-btn]").forEach((b) => b.classList.remove("bg-emerald-400", "text-slate-900"));
    }
    function clearAutoPause() { if (autoPauseTimer) clearTimeout(autoPauseTimer); autoPauseTimer = null; autoPauseLockIndex = null; }
    function jumpTo(i, opt = {}) {
      const line = transcript[i];
      if (!line || !playerReady || !player) return;
      if (opt.increment) inc(i);
      if (opt.clearLoopFirst !== false) clearLoop();
      clearAutoPause();
      completeLockIndex = null;
      setCurrent(i);
      player.seekTo(line.start, true);
      player.playVideo();
    }
    function loopLine(i) {
      const line = transcript[i];
      if (!line || !playerReady || !player) return;
      activeLoop = { index: i, start: line.start, end: line.start + line.duration };
      jumpTo(i, { increment: true, clearLoopFirst: false });
      let counted = false;
      clearInterval(loopTimer);
      loopTimer = setInterval(() => {
        const t = player.getCurrentTime();
        if (t < activeLoop.start + 0.12) counted = false;
        if (t >= activeLoop.end - 0.05) {
          if (!counted) { inc(i); counted = true; }
          player.seekTo(activeLoop.start, true);
          player.playVideo();
        }
      }, 140);
    }
    function setRate(rate, options = {}) {
      currentPlaybackRate = rate;
      if (playerReady && player) player.setPlaybackRate(rate);
      document.querySelectorAll("[data-rate-btn]").forEach((b) => {
        const on = Number(b.getAttribute("data-rate-btn")) === rate;
        b.className = on
          ? "rate-btn min-h-12 px-4 rounded-xl border border-cyan-300 bg-cyan-400 text-slate-900 font-semibold"
          : "rate-btn min-h-12 px-4 rounded-xl border border-slate-600 bg-slate-800";
      });
      if (options.persistSlowPreference && rate !== 1) {
        preferredSlowRate = rate;
        saveUiState();
      }
      if (focusModeEnabled) render();
      else applyCurrentHighlight();
    }
    function isPlayerPlaying() { return Boolean(playerReady && player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING); }
    function handlePlayerStateChange() {
      syncPlayPauseButtons();
      if (!player || !player.getPlayerState) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED) setTowerCollapsed(false);
    }
    function syncPlayPauseButtons() {
      const playing = isPlayerPlaying();
      document.querySelectorAll("[data-playpause-btn]").forEach((btn) => {
        const i = Number(btn.getAttribute("data-playpause-btn"));
        const isCurrent = i === currentLineIndex;
        btn.textContent = isCurrent && playing ? "⏸️ 暫停" : "▶️ 播放";
      });
    }
    function toggleLinePlayback(i) {
      if (!playerReady || !player || !transcript[i]) return;
      if (currentLineIndex !== i) {
        jumpTo(i, { increment: true });
        syncPlayPauseButtons();
        return;
      }
      const state = player.getPlayerState ? player.getPlayerState() : -1;
      if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
        setStatus("已暫停目前句。");
      } else {
        player.playVideo();
        setStatus("已繼續播放目前句。");
      }
      syncPlayPauseButtons();
    }
    function playLineWithRate(i, rate) {
      if (!transcript[i]) return;
      if (!playerReady || !player) return;
      if (rate !== 1) {
        lineRateOverrideActive = true;
        lineRateOverrideFrom = i;
        preferredSlowRate = rate;
      } else {
        lineRateOverrideActive = false;
        lineRateOverrideFrom = -1;
      }
      setRate(rate, { persistSlowPreference: true });
      jumpTo(i, { increment: true });
    }
    function render() {
      ui.transcriptList.innerHTML = "";
      ui.countText.textContent = String(transcript.length);
      if (!transcript.length) { ui.transcriptList.innerHTML = `<div class="rounded-xl border border-slate-700 bg-card p-4 text-slate-300">沒有可顯示的字幕。</div>`; return; }
      transcript.forEach((line, i) => {
        const hiddenClass = focusModeEnabled && i !== currentLineIndex ? " hidden" : "";
        const count = Number(countsByLine[countKey(line)] || 0);
        const isCurrent = i === currentLineIndex;
        const enVisible = (line.showEn || isCurrent) && line.en;
        const zhVisible = (line.showZh || isCurrent) && line.zh;
        const enBlock = enVisible ? `<p class="subtitle-text text-left w-full rounded-xl border border-slate-600 bg-slate-900/70 px-4 py-3 text-base leading-relaxed text-slate-100">${esc(line.en)}</p>` : "";
        const zhBlock = zhVisible ? `<p class="subtitle-text text-left w-full rounded-xl border border-slate-700 bg-slate-800/70 px-4 py-3 text-base leading-relaxed text-sky-200">${esc(line.zh)}</p>` : "";
        const playPauseLabel = isCurrent && isPlayerPlaying() ? "⏸️ 暫停" : "▶️ 播放";
        const row = document.createElement("div");
        row.className = `subtitle-row rounded-xl border border-slate-700 bg-line/70 p-3 sm:p-4${hiddenClass}`;
        row.setAttribute("data-line", String(i));
        row.innerHTML = `<div class="flex flex-col gap-3"><div class="flex flex-wrap items-center gap-2"><button data-jump-btn="${i}" class="w-full sm:w-auto min-h-12 rounded-xl bg-cyan-400 text-slate-900 px-4 py-2 font-semibold text-base">${fmt(line.start)} 跳到這句</button><button data-loop-btn="${i}" class="w-full sm:w-auto min-h-12 rounded-xl border border-slate-500 px-4 py-2 text-base">🔁 循環</button><button data-playpause-btn="${i}" class="min-h-12 rounded-xl border border-amber-400 text-amber-300 px-4 py-2 text-base">${playPauseLabel}</button><button data-line-rate="${i}" data-line-rate-value="${preferredSlowRate}" class="min-h-10 rounded-lg border border-violet-400 text-violet-300 px-3 py-1 text-sm">${preferredSlowRate}x</button><button data-line-rate="${i}" data-line-rate-value="1" class="min-h-10 rounded-lg border border-violet-400 text-violet-300 px-3 py-1 text-sm">1x</button><span data-count-label="${i}" class="count-badge h-9 min-w-9 px-2 rounded-full border border-slate-500 bg-slate-900 text-sm text-slate-100 inline-flex items-center justify-center font-semibold">${count}</span><button data-toggle-en="${i}" class="min-h-10 rounded-lg border px-3 py-1 text-sm ${line.showEn ? "border-emerald-400 text-emerald-300" : "border-slate-500 text-slate-300"}">${trackLabelA}</button><button data-toggle-zh="${i}" class="min-h-10 rounded-lg border px-3 py-1 text-sm ${line.showZh ? "border-sky-400 text-sky-300" : "border-slate-500 text-slate-300"}">${trackLabelB}</button></div>${enBlock}${zhBlock}</div>`;
        row.addEventListener("pointerdown", () => row.classList.add("force-reveal"));
        ["pointerup", "pointercancel", "pointerleave"].forEach((e) => row.addEventListener(e, () => row.classList.remove("force-reveal")));
        ui.transcriptList.appendChild(row);
      });
      document.querySelectorAll("[data-jump-btn]").forEach((b) => b.addEventListener("click", () => jumpTo(Number(b.getAttribute("data-jump-btn")), { increment: true })));
      document.querySelectorAll("[data-loop-btn]").forEach((b) => b.addEventListener("click", () => {
        const i = Number(b.getAttribute("data-loop-btn"));
        if (activeLoop && activeLoop.index === i) return clearLoop();
        clearLoop(); clearAutoPause(); b.classList.add("bg-emerald-400", "text-slate-900"); loopLine(i);
      }));
      document.querySelectorAll("[data-playpause-btn]").forEach((b) => b.addEventListener("click", () => toggleLinePlayback(Number(b.getAttribute("data-playpause-btn")))));
      document.querySelectorAll("[data-line-rate]").forEach((b) => b.addEventListener("click", () => {
        const i = Number(b.getAttribute("data-line-rate"));
        const rate = Number(b.getAttribute("data-line-rate-value"));
        playLineWithRate(i, rate);
      }));
      document.querySelectorAll("[data-toggle-en]").forEach((b) => b.addEventListener("click", () => {
        const i = Number(b.getAttribute("data-toggle-en"));
        transcript[i].showEn = !transcript[i].showEn;
        globalLangMode = "custom";
        saveBilingual();
        saveUiState();
        refreshGlobalButtons();
        render();
      }));
      document.querySelectorAll("[data-toggle-zh]").forEach((b) => b.addEventListener("click", () => {
        const i = Number(b.getAttribute("data-toggle-zh"));
        transcript[i].showZh = !transcript[i].showZh;
        globalLangMode = "custom";
        saveBilingual();
        saveUiState();
        refreshGlobalButtons();
        render();
      }));
      applyCurrentHighlight();
      syncPlayPauseButtons();
    }

    function tick() {
      if (!playerReady || !player || !transcript.length) return;
      const t = player.getCurrentTime();
      const i = findIdx(t);
      if (lineRateOverrideActive && autoResetLineRate && i >= 0 && i !== lineRateOverrideFrom) {
        lineRateOverrideActive = false;
        lineRateOverrideFrom = -1;
        setRate(1, { persistSlowPreference: false });
      }
      if (i >= 0 && i !== currentLineIndex) setCurrent(i);
      syncPlayPauseButtons();
      if (!activeLoop && i >= 0) {
        const end = transcript[i].start + transcript[i].duration;
        if (t >= end - 0.05 && completeLockIndex !== i) { completeLockIndex = i; inc(i); }
        if (t < end - 0.2) completeLockIndex = null;
      }
      if (!autoPauseEnabled || activeLoop || i < 0) return;
      if (player.getPlayerState && player.getPlayerState() !== YT.PlayerState.PLAYING) return;
      const end = transcript[i].start + transcript[i].duration;
      if (t >= end - 0.05 && autoPauseLockIndex !== i) {
        autoPauseLockIndex = i;
        player.pauseVideo();
        const waitMs = Math.max(400, transcript[i].duration * 1200);
        clearTimeout(autoPauseTimer);
        autoPauseTimer = setTimeout(() => {
          if (!autoPauseEnabled) return;
          const n = i + 1;
          if (n >= transcript.length) return setStatus("Auto-Pause 已播到最後一句。");
          jumpTo(n, { increment: false });
        }, waitMs);
      }
    }

    function applyManual() {
      const sec = Number(ui.manualDurationInput.value || 2.5);
      const enParsed = parseScript(ui.manualEnInput.value, sec);
      const zhParsed = parseScript(ui.manualZhInput.value, sec);
      const aligned = alignBilingual(enParsed, zhParsed, sec);
      if (!aligned.length) return setStatus("手動字幕格式無法解析，請檢查內容。", true);
      transcript = aligned;
      updateTrackLabels();
      clearLoop(); clearAutoPause(); completeLockIndex = null; currentLineIndex = -1;
      loadCounts(); saveBilingual(); render(); setRate(currentPlaybackRate); setStatus("已套用雙語字幕。");
    }

    async function loadVideoAndTranscript() {
      const raw = ui.urlInput.value.trim();
      if (!raw) return setStatus("請先貼上 YouTube 網址或影片 ID", true);
      const videoId = parseYouTubeId(raw);
      if (!videoId) return setStatus("網址格式無法辨識 YouTube 影片 ID", true);
      const videoUrl = raw.startsWith("http") ? raw : `https://www.youtube.com/watch?v=${videoId}`;
      currentVideoId = videoId;
      ui.videoIdText.textContent = videoId;
      ensurePlayer(videoId);
      loadUiState();
      syncTranscriptOffset();
      setPlayerHidden(playerHidden);
      refreshGlobalButtons();
      setGlobalBlur(globalBlurEnabled);
      clearLoop(); clearAutoPause(); completeLockIndex = null; currentLineIndex = -1;
      if (loadBilingual()) { updateTrackLabels(); loadCounts(); render(); setRate(currentPlaybackRate); setStatus("已回復此影片的雙語字幕與顯示設定。"); return; }
      setStatus("正在載入字幕...");
      try { transcript = await fetchTranscript(videoUrl, videoId); updateTrackLabels(); loadCounts(); saveBilingual(); render(); setRate(currentPlaybackRate); setStatus("字幕載入成功。"); }
      catch { transcript = []; render(); setStatus(FAIL_MSG, true); alert(FAIL_MSG); }
    }

    window.onYouTubeIframeAPIReady = () => { playerReady = true; clearInterval(tickTimer); tickTimer = setInterval(tick, 100); setRate(currentPlaybackRate); };
    ui.loadBtn.addEventListener("click", loadVideoAndTranscript);
    ui.manualOpenBtn.addEventListener("click", () => ui.manualDialog.showModal());
    ui.manualCancelBtn.addEventListener("click", () => ui.manualDialog.close());
    ui.manualApplyBtn.addEventListener("click", () => { applyManual(); ui.manualDialog.close(); });
    ui.stopLoopBtn.addEventListener("click", () => { clearLoop(); clearAutoPause(); });
    ui.prevBtn.addEventListener("click", () => { if (transcript.length) jumpTo(Math.max(0, (currentLineIndex >= 0 ? currentLineIndex : 0) - 1), { increment: true }); });
    ui.replayBtn.addEventListener("click", () => { if (transcript.length) jumpTo(currentLineIndex >= 0 ? currentLineIndex : 0, { increment: true }); });
    ui.nextBtn.addEventListener("click", () => { if (transcript.length) jumpTo(Math.min(transcript.length - 1, (currentLineIndex >= 0 ? currentLineIndex : 0) + 1), { increment: true }); });
    ui.autoPauseToggle.addEventListener("change", (e) => { autoPauseEnabled = Boolean(e.target.checked); clearAutoPause(); setStatus(autoPauseEnabled ? "Auto-Pause 已開啟" : "Auto-Pause 已關閉"); });
    ui.globalShowEnBtn.addEventListener("click", () => applyGlobalLang("en"));
    ui.globalShowZhBtn.addEventListener("click", () => applyGlobalLang("zh"));
    ui.globalShowBothBtn.addEventListener("click", () => applyGlobalLang("both"));
    ui.globalBlurBtn.addEventListener("click", () => setGlobalBlur(!globalBlurEnabled));
    ui.focusModeBtn.addEventListener("click", () => setFocusMode(!focusModeEnabled));
    ui.hidePlayerBtn.addEventListener("click", () => setPlayerHidden(!playerHidden));
    ui.lineRateResetBtn.addEventListener("click", () => setAutoResetLineRate(!autoResetLineRate));
    document.querySelectorAll("[data-rate-btn]").forEach((b) => b.addEventListener("click", () => setRate(Number(b.getAttribute("data-rate-btn")))));
    ui.urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") loadVideoAndTranscript(); });
    ui.transcriptSection.addEventListener("scroll", () => {
      const y = ui.transcriptSection.scrollTop || 0;
      const delta = y - lastScrollY;
      if (Math.abs(delta) > 10) {
        if (delta > 0 && isPlayerPlaying()) setTowerCollapsed(true);
        if (delta < 0) setTowerCollapsed(false);
      }
      lastScrollY = y;
    }, { passive: true });
    window.addEventListener("resize", syncTranscriptOffset);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", syncTranscriptOffset);
    syncTranscriptOffset();
    refreshGlobalButtons();
    setStatus("尚未載入影片");
  </script>
</body>
</html>
